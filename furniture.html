<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>furniture</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* --- RESET & VARIABLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        :root {
            --bg-primary: #121614;
            --bg-card: rgba(255, 255, 255, 0.03);
            --accent-wood: #b58252;
            --accent-fabric: #4a6b5d;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --glass-border: rgba(255, 255, 255, 0.08);
            
            /* Variabel Warna Utama Kode Kedua (Nuansa Biru) */
            --blue-light: #2575fc; 
            --blue-dark: #6a11cb;  
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* --- NAVBAR --- */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--text-main);
            text-transform: uppercase;
        }

        .logo img {
            height: 100px; 
            width: auto;
            object-fit: contain;
        }

        .logo span { 
            color: var(--accent-wood); 
            text-stroke: 2px black;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
        }
        
        .nav-links a:hover, .nav-links a.active {
            color: var(--text-main);
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        /* --- HERO SECTION --- */
        .hero {
            height: 150vh; 
            display: flex;
            align-items: center;
            padding: 0 5%;
            position: relative;
            /* Ditambahkan overlay gelap agar teks putih kontras dan terbaca */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://lh3.googleusercontent.com/u/0/d/1CBwiD06r3CJ0BGB0BmJqiXO-1b_yTT1c') center/cover no-repeat;
        }

        .hero-content2 {
            max-width: 600px;
            z-index: 2;
        }

        .hero-content2 h1 {
            font-size: 3.5rem;
            line-height: 1.2;
            margin-bottom: 20px;
            font-weight: 700;
            color: #ffffff; /* PERBAIKAN: Mengunci warna teks judul menjadi putih */
        }

        .hero-content2 p {
            color: #ffffff; /* PERBAIKAN: Mengunci warna teks deskripsi menjadi putih */
            margin-bottom: 30px;
            font-size: 1.1rem;
            opacity: 0.9;
        }

        /* --- PRODUCT CUSTOMIZER SECTION --- */
        .customizer-section {
            padding: 100px 5%;
            background: #ffffff; /* Mengubah background area customizer menjadi putih */
        }

        .section-title {
            text-align: center;
            margin-bottom: 60px;
        }

        .section-title h2 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #111827; /* Menjadi hitam/gelap agar terlihat di background putih */
        }

        .section-title p {
            color: var(--text-muted);
        }

        .customizer-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .product-display {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .product-image {
            width: 100%;
            max-width: 400px;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.1)); /* Shadow diperhalus untuk latar putih */
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .customizer-controls {
            padding: 20px;
        }

        .customizer-controls h3 {
            font-size: 1.8rem;
            margin-bottom: 15px;
            color: #111827;
        }

        .furniture-list {
            list-style: none;
            margin-bottom: 20px;
        }

        .furniture-list li {
            font-size: 1.1rem;
            margin-bottom: 12px;
            color: #111827; /* Mengganti var(--text-main) menjadi hitam tegas agar terbaca */
            white-space: pre-line; /* Menambahkan ini agar fungsi breakline (\n) pada JS berjalan rapi */
        }

        .price {
            font-size: 1.5rem;
            color: var(--accent-wood);
            font-weight: 700;
            margin-bottom: 25px;
        }

        .option-group {
            margin-bottom: 30px;
        }

        .option-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            color: var(--text-muted);
        }

        /* COLOR & MATERIAL BUTTONS */
        .color-pickers {
            display: flex;
            gap: 15px;
        }

        .color-dot {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .color-dot.active {
            border-color: #111827; /* Mengubah indikator aktif menjadi gelap menyesuaikan tema putih */
            transform: scale(1.1);
        }

        .dot-c1 { background-color: #dcdddb; border: 1px solid #ccc; }
        .dot-c2 { background-color: #704085; }
        .dot-c3 { background-color: #e77543; }

        /* --- STYLE UNTUK TOMBOL BARU DI PALING BAWAH --- */
        .button-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px 0; 
            background-color: #ffffff; /* Mengubah wrapper tombol menjadi putih */
        }

        .btn-web-animated {
            background: linear-gradient(45deg, var(--blue-light), var(--blue-dark));
            box-shadow: 0 0 15px rgba(37, 117, 252, 0.3);
            animation: pulse-web-main 2s infinite;
            transition: transform 0.3s ease;
            width: 250px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
            border: none;
            color: white;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            letter-spacing: 1px;
        }

        .btn-web-animated:hover {
            transform: scale(1.05);
        }

        /* ANIMASI PULSA TOMBOL */
        @keyframes pulse-web-main {
            0% { 
                transform: scale(1); 
                box-shadow: 0 0 0 0 rgba(37, 117, 252, 0.5); 
            }
            70% { 
                transform: scale(1.05); 
                box-shadow: 0 0 0 10px rgba(37, 117, 252, 0); 
            }
            100% { 
                transform: scale(1); 
                box-shadow: 0 0 0 0 rgba(37, 117, 252, 0); 
            }
        }

       /* --- RESPONSIVE LAYOUT UNTUK MOBILE ANDROID --- */
@media (max-width: 768px) {
    nav { 
        padding: 10px 4%; 
        /* Efek Glassmorphism */
        background-color: rgba(255, 255, 255, 0.1); /* Warna putih transparan */
        backdrop-filter: blur(2px); /* Efek blur pada background di bawah nav */
        -webkit-backdrop-filter: blur(1px); /* Dukungan untuk browser Safari/iOS */
        border-bottom: 1px solid rgba(255, 255, 255, 0.1); /* Garis pembatas tipis transparan */
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1); /* Bayangan lembut agar nav lebih menonjol */
        
        /* Opsional: Pastikan nav tetap berada di paling atas saat di-scroll */
        position: fixed; 
        top: 0;
        left: 0;
        width: 100%;
        z-index: 1000;
    }
    
    .nav-links { display: none; } 
    .customizer-container { grid-template-columns: 1fr; gap: 20px;  }
    .hero-content2 h1 { font-size: 2rem; color: #ffffff; } /* Diperbaiki dari #00000 menjadi #000000 */
    .hero-content2 p { font-size: 0.95rem; color: #ffffff; }
    .product-image { max-height: 350px; } 
    
    .hero { 
        top: 50px;
        height: 50vh;  
        width: 100vw; 
        margin: 0 auto; 
        display: flex;
        flex-direction: column;
        justify-content: center; 
        align-items: center;    
        text-align: center;
        background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0)), url('https://lh3.googleusercontent.com/u/0/d/1CBwiD06r3CJ0BGB0BmJqiXO-1b_yTT1c') center/cover no-repeat;
    }
}
    </style>
</head>
<body>

    <nav>
        <div class="logo">
            <img src="https://drive.google.com/thumbnail?sz=w500&id=1CZ1_KLCaTw56YSy3wH-a3rBJLa0E1nBf" alt="Logo">
            <span>furniture</span>
        </div>
        <ul class="nav-links">
            <li><a href="#" class="active">Utama</a></li>
            <li><a href="#">Koleksi</a></li>
            <li><a href="#">Rancangan</a></li>
        </ul>
    </nav>

    <section class="hero" id="heroBg">
        <div class="hero-content2">
            <h1 id="heroTitle">Pengalaman Berkesan <br>di Ruang Anda</h1>
            <p id="heroDesc">Kami merancang bangun furniture bukan sekadar fungsi, melainkan sebuah karya seni interaktif yang mengisi jiwa rumah Anda.</p>
        </div>
    </section>

    <section class="customizer-section" id="customizer">
        <div class="section-title">
            <h2>Interaktif Pilihan</h2>
        </div>

        <div class="customizer-container">
            <div class="product-display" id="tiltCard">
                <img src="https://lh3.googleusercontent.com/d/1SacgdbZug4ZkB6IwZSV3lL8lGdmxvNq4" class="product-image" id="productImg">
            </div>
            <div class="customizer-controls">
                <h3 id="productName"></h3>
                
                <ul class="furniture-list" id="furnitureList"></ul>

                <div class="price" id="productPrice"></div>
                <p style="color: var(--text-muted); margin-bottom: 25px;"></p>
                
                <div class="option-group">
                    <div class="option-title">Pilih Varian</div>
                    <div class="color-pickers">
                        <div class="color-dot dot-c1 active" onclick="changeVariant('c1', this)"></div>
                        <div class="color-dot dot-c2" onclick="changeVariant('c2', this)"></div>
                        <div class="color-dot dot-c3" onclick="changeVariant('c3', this)"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div class="button-wrapper">
        <button onclick="openLink()" class="btn-web-animated" title="Mulai Diskusi RND PO">
            DISKUSI RnD P.O
        </button>
    </div>

    <script>
        // --- 1. DATA KONTEN HERO ---
        const heroData = [   
            {
                bg: "https://lh3.googleusercontent.com/u/0/d/1CBwiD06r3CJ0BGB0BmJqiXO-1b_yTT1c",
                title: "Pengalaman Berkesan di Ruang Anda",
                desc: "Kami merancang bangun furniture bukan sekadar fungsi, melainkan sebuah karya seni interaktif yang mengisi jiwa rumah Anda."
            },
            {
                bg: "https://lh3.googleusercontent.com/u/0/d/17rDviRouf0Rh93x23dSe4A2JMhAZ-ubj",
                title: "Kenyamanan Ruang Keluarga Klasik",
                desc: "Hadirkan kehangatan mendalam di ruang santai Anda dengan sentuhan material premium pilihan."
            },
            {
                bg: "https://lh3.googleusercontent.com/u/0/d/1Ow_n6k8QhYDMwmZYv4Q04obUeOgnekj1",
                title: "Sentuhan Estetika Modern Minimalis",
                desc: "Desain yang presisi, ringkas, dan mengutamakan efisiensi ruang tanpa mengorbankan keindahan visual."
            }
        ];

        function changeHero(index) {
            const heroBg = document.getElementById('heroBg');
            const heroTitle = document.getElementById('heroTitle');
            const heroDesc = document.getElementById('heroDesc');
            
            heroBg.style.opacity = "0.8";
            
            setTimeout(() => {
                /* PERBAIKAN: Mengunci gradasi gelap (rgba(0,0,0,0.5)) di JavaScript saat transisi hero agar teks putih tetap kontras */
                heroBg.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0)), url('${heroData[index].bg}')`;
                heroTitle.innerText = heroData[index].title;
                heroDesc.innerText = heroData[index].desc;
                heroBg.style.opacity = "1";
            }, 200);
        }

        // --- 2. FITUR CUSTOMIZER FURNITURE ---
        const variants = {
            c1: {
                img: "https://lh3.googleusercontent.com/d/1SacgdbZug4ZkB6IwZSV3lL8lGdmxvNq4", 
                name: "",
                items: [
                    "• Ottoman: 50x50x45 \n (Rp1.500.000)",
                    "• Ottoman: 195x50x42 \n (Rp6.500.000)",
                    "• Dipan: 180x200x30 \n (Rp8.000.000)",
                    "• Kepala Dipan: 180x100x10 \n (Rp5.000.000)"
                ],
                price: "Total Paket: Rp21.000.000"
            },
            c2: { 
                img: "https://lh3.googleusercontent.com/d/1TGLBKZOuWchqRpXlELkHIQi1p0Ai176K",
                name: "Paket Keluarga Klasik",
                items: [
                    "• Ottoman: 50x50x45 \n (Rp1.500.000)",
                    "• Ottoman: 195x50x42 \n (Rp6.500.000)",
                    "• Dipan: 180x200x30 \n (Rp8.000.000)",
                    "• Kepala Dipan: 180x100x10 \n (Rp5.000.000)"
                ],
                price: "Total Paket: Rp21.000.000"
            },
            c3: {
                img: "https://lh3.googleusercontent.com/d/1Mv2l-dS1kgU2skxQPZYyoblTwqda5jKc",
                name: "Paket Minimalis Modern",
                items: [
                    "• Ottoman: 50x50x45 \n (Rp1.500.000)",
                    "• Ottoman: 195x50x42 \n (Rp6.500.000)",
                    "• Dipan: 180x200x30 \n (Rp8.000.000)",
                    "• Kepala Dipan: 180x100x10 \n (Rp5.000.000)"
                ],
                price: "Total Paket: Rp21.000.000"
            }
        };

        function changeVariant(key, element) {
            const imgEl = document.getElementById('productImg');
            const nameEl = document.getElementById('productName');
            const priceEl = document.getElementById('productPrice');
            const listEl = document.getElementById('furnitureList');

            imgEl.style.transform = 'scale(0.95)';
            imgEl.style.opacity = '0';

            setTimeout(() => {
                imgEl.src = variants[key].img;
                imgEl.style.borderRadius = "15px"; 
                imgEl.style.height = "400px";
                imgEl.style.objectFit = "cover";
                
                nameEl.innerText = variants[key].name;
                priceEl.innerText = variants[key].price;
                
                listEl.innerHTML = "";
                variants[key].items.forEach(itemText => {
                    const li = document.createElement('li');
                    li.innerText = itemText;
                    listEl.appendChild(li);
                });
                
                imgEl.style.transform = 'scale(1)';
                imgEl.style.opacity = '1';
            }, 300);

            document.querySelectorAll('.color-dot').forEach(dot => dot.classList.remove('active'));
            element.classList.add('active');

            if (key === 'c1') {
                changeHero(0);
            } else if (key === 'c2') {
                changeHero(1);
            } else if (key === 'c3') {
                changeHero(2);
            }
        }

        // --- 3. LOGIKA INTERAKSI TOMBOL ---
        function openLink() { 
            window.open("https://firstian84.github.io/firstiantechnology/tech.html", "_blank"); 
        }

        // --- 4. NAVIGATION UTILITY ---
        window.onload = function() {
            changeVariant('c1', document.querySelector('.dot-c1'));
        };
    </script>
</body>
</html>
