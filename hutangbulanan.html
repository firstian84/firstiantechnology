<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HUTANG BULANAN</title>
    
    <style>
        :root {
            --bg-color: #0d1117; 
            --card-bg: #161b22; 
            --card-bg-interacted: #111418; 
            --accent-red-main: #ff1a1a; 
            --accent-red-glow: rgba(255, 26, 26, 0.8);
            --border-red: #cc0000;
            --accent-blue-main: #00d2ff;
            --accent-blue-glow: rgba(0, 210, 255, 0.4);
            --border-blue: #00a3cc;
            --accent-yellow: #ff9800;
            --accent-green: #00ff88;
            --text-main: #e6edf3;
            --text-dim: #8b949e;
        }

        @keyframes issuePulse {
            0%, 100% { box-shadow: 0 0 5px rgba(255, 152, 0, 0.2); border-color: var(--accent-yellow); }
            50% { box-shadow: 0 0 25px rgba(255, 152, 0, 0.6); border-color: #ffffff; }
        }

        @keyframes vPulseRedBg {
            0% { background-color: var(--card-bg); border-color: var(--accent-red-main); box-shadow: 0 0 5px rgba(255, 26, 26, 0.2); }
            50% { background-color: #3d0000; border-color: #ff4d4d; box-shadow: 0 0 20px rgba(255, 26, 26, 0.5); }
            100% { background-color: var(--card-bg); border-color: var(--accent-red-main); box-shadow: 0 0 5px rgba(255, 26, 26, 0.2); }
        }

        html { scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; user-select: none; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding: 20px; overflow-x: hidden;
        }

        .project-header { width: 100%; max-width: 900px; text-align: center; margin-bottom: 10px; padding: 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        #project-name-display { font-size: 0.9rem; color: var(--accent-blue-main); letter-spacing: 3px; font-weight: 600; text-transform: uppercase; text-shadow: 0 0 8px var(--accent-blue-glow); }
        
        .progress-container { width: 100%; max-width: 900px; margin: 10px 0; background: #30363d; height: 6px; border-radius: 10px; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; background: linear-gradient(to right, var(--accent-red-main), var(--accent-blue-main)); transition: width 0.5s ease-in-out; }
        .percentage-text { font-size: 0.8rem; font-weight: bold; color: var(--accent-green); margin-top: 5px; font-family: monospace; }

        .admin-controls { margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .btn-action { background: transparent; border: 1px solid var(--text-dim); color: var(--text-dim); padding: 8px 15px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; text-transform: uppercase; }
        .btn-confirm { border-color: var(--accent-blue-main); color: var(--accent-blue-main); }
        .btn-delete:hover { border-color: var(--accent-red-main); color: var(--accent-red-main); }

        .container { width: 100%; max-width: 900px; }
        h1 { text-align: center; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; font-size: 1.4rem; font-weight: 800; background: linear-gradient(to right, var(--accent-red-main), #fff, var(--accent-blue-main)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .workflow-wrapper { position: relative; display: flex; flex-direction: column; gap: 20px; padding-bottom: 40px; }
        .workflow-wrapper::before { content: ''; position: absolute; left: 25px; top: 0; bottom: 0; width: 2px; background: linear-gradient(to bottom, var(--accent-red-main) 0%, var(--border-blue) 100%); z-index: 0; opacity: 0.5; }

        .step-card {
            background: var(--card-bg); border: 1px solid #30363d; 
            border-radius: 12px; padding: 15px 15px 15px 65px; position: relative;
            transition: all 0.3s ease; cursor: pointer; z-index: 1; overflow: hidden;
        }

        .step-number {
            position: absolute; left: 12px; top: 15px; width: 32px; height: 32px;
            background: var(--bg-color); border: 2px solid var(--text-dim);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: 800; color: var(--text-dim);
        }

        .step-card.verification-active { animation: vPulseRedBg 1.2s infinite ease-in-out; border-width: 1.5px; }
        .step-card.interacted { border-color: var(--accent-blue-main) !important; background: var(--card-bg-interacted) !important; box-shadow: 0 0 15px var(--accent-blue-glow) !important; cursor: default; animation: none !important; }
        
        .step-content h3 { font-size: 1.1rem; color: var(--text-main); text-transform: uppercase; }
        .step-content p { font-size: 0.85rem; color: var(--text-dim); line-height: 1.4; margin-bottom: 5px; }

        .action-row { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.05); }
        .link-input-group { display: flex; flex-direction: row; gap: 6px; }
        .link-input-small { flex-grow: 1; background: #0d1117; border: 1px solid #30363d; border-radius: 4px; padding: 4px 10px; color: #00d2ff; font-size: 0.7rem; outline: none; height: 28px; }
        .btn-save-link { background: var(--accent-blue-main); border: none; color: black; font-weight: bold; font-size: 0.65rem; padding: 0 12px; border-radius: 4px; cursor: pointer; }

        .image-preview-container { display: flex; gap: 12px; width: 100%; overflow-x: auto; padding: 5px 0; min-height: 50px; }
        .preview-img { width: 120px; height: 120px; object-fit: cover; border-radius: 8px; border: 1px solid var(--accent-blue-main); flex-shrink: 0; cursor: pointer; }

        .status-badge { display: inline-block; font-size: 0.65rem; font-weight: 700; padding: 3px 10px; border-radius: 4px; border: 1px solid #30363d; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; }
        .timestamp-active { font-size: 0.7rem; color: var(--accent-blue-main); margin-top: 8px; font-family: monospace; font-weight: bold; display: none; }
        .gps-display { font-size: 0.65rem; color: var(--accent-green); margin-top: 4px; font-family: monospace; display: none; }
        
        .step-card.interacted .timestamp-active, 
        .step-card.interacted .gps-display { display: block; }

        .issue-monitor-section { width: 100%; max-width: 900px; margin-top: 20px; padding-top: 30px; border-top: 2px dashed rgba(255,255,255,0.1); }
        .issue-card { background: var(--card-bg); border: 1px solid #30363d; border-radius: 12px; padding: 25px; }
        .issue-card.has-issue { background: #2a1b00 !important; border-color: var(--accent-yellow) !important; animation: issuePulse 2s infinite ease-in-out; }
        .issue-input { width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 14px; color: white; margin-top: 10px; }
        .btn-update-issue { background: transparent; color: var(--accent-yellow); border: 1px solid var(--accent-yellow); padding: 10px; border-radius: 8px; width: 100%; margin-top: 10px; cursor: pointer; font-weight: bold; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(5px); }
        .modal-box { background: var(--card-bg); border: 1px solid var(--accent-blue-main); padding: 25px; border-radius: 12px; width: 90%; max-width: 400px; text-align: center; }
        .modal-box h2 { font-size: 1.2rem; margin-bottom: 15px; letter-spacing: 1px; color: white; }
        .modal-box input { width: 100%; padding: 12px; background: var(--bg-color); border: 1px solid var(--border-blue); color: white; border-radius: 6px; margin-bottom: 20px; outline: none; }

        /* ==================== RESPONSIVE LAYOUT (ANDROID/MOBILE OPTIMIZATION) ==================== */
        @media (max-width: 600px) {
            body { padding: 12px; }
            h1 { font-size: 1.2rem; margin-bottom: 15px; }
            
            .workflow-wrapper::before { left: 20px; }
            
            .step-card { padding: 15px 12px 15px 50px; border-radius: 10px; }
            .step-number { left: 8px; top: 14px; width: 28px; height: 28px; font-size: 9px; }
            .step-content h3 { font-size: 0.95rem; }
            .step-content p { font-size: 0.75rem; }
            
            .link-input-group { flex-direction: column; gap: 8px; width: 100%; }
            .link-input-small { width: 100%; height: 35px; font-size: 0.8rem; padding: 6px 10px; }
            .btn-save-link { width: 100%; height: 35px; font-size: 0.8rem; padding: 8px 0; margin-top: 2px; }
            
            .preview-img { width: 90px; height: 90px; }
            .issue-card { padding: 15px; }
            .admin-controls .btn-action { padding: 8px 12px; font-size: 0.65rem; }
        }
    </style>
</head>
<body>

<div class="modal-overlay" id="projectModal">
    <div class="modal-box">
        <h2>BARU</h2>
        <input type="text" id="clientInput" placeholder="NAMA / TARGET ANGSURAN...">
        <div style="display: flex; gap: 10px; justify-content: center;">
            <button class="btn-action" onclick="closeModal()">Batal</button>
            <button class="btn-action btn-confirm" onclick="confirmProject()">Simpan</button>
        </div>
    </div>
</div>

<div class="project-header">
    <div id="project-name-display">SYNCING LOGS...</div>
</div>

<div class="container" style="text-align: center; margin-bottom: 10px;">
    <div class="percentage-text" id="percent-label"REPAYMENT PROGRESS: 0%</div>
    <div class="progress-container">
        <div class="progress-bar" id="completion-bar"></div>
    </div>
</div>

<div class="admin-controls">
    <button class="btn-action" onclick="openModal()">Registrasi</button>
    <button class="btn-action btn-delete" onclick="deleteLatestProject()">Hapus</button>
</div>

<div class="container">
    <h1>HUTANG BULANAN</h1>
    <div class="workflow-wrapper" id="workflow"></div>

    <div class="issue-monitor-section">
        <div class="issue-card" id="issue-card-main">
            <div class="status-badge" style="border-color:var(--accent-yellow); color:var(--accent-yellow)">Payment Delay Reason</div>
            <h3 id="issue-title">Catatan Keterlambatan / Kendala Bulan Ini</h3>
            <p id="issue-desc-main">Mengecek log kendala...</p>
            <input type="text" class="issue-input" id="issue-text-input" placeholder="Tulis alasan jika debitur minta penundaan atau macet...">
            <button class="btn-update-issue" onclick="saveIssue()">Update Catatan Kendala</button>
        </div>
    </div>
</div>

<script>
    const CONFIG = {
        URL: "https://enabled-crayfish-71186.upstash.io",
        TOKEN: "gQAAAAAAARYSAAIncDE2MzUzMjQ5Mzg2N2E0YzU2OTUxODJjZWNmY2E2NzkyMXAxNzExODY",
        PREFIX: "sales_INFINIX HOT30"
    };

    let currentActiveProject = null;

    const stepsTemplate = [
        { id: "1", badge: "Bulan 01", title: "Angsuran Bulan ke-1", desc: "upload bukti pembayaran pada GDrive, bagikan public dan tempelkan, simpan alamatnya pada input konten" },
        { id: "2", badge: "Bulan 02", title: "Angsuran Bulan ke-2", desc: "upload bukti pembayaran pada GDrive, bagikan public dan tempelkan, simpan alamatnya pada input konten" },
        { id: "3", badge: "Bulan 03", title: "Angsuran Bulan ke-3", desc: "upload bukti pembayaran pada GDrive, bagikan public dan tempelkan, simpan alamatnya pada input konten" },
        { id: "4", badge: "Bulan 04", title: "Angsuran Bulan ke-4", desc: "upload bukti pembayaran pada GDrive, bagikan public dan tempelkan, simpan alamatnya pada input konten" },
        { id: "5", badge: "Bulan 05", title: "Angsuran Bulan ke-5", desc: "upload bukti pembayaran pada GDrive, bagikan public dan tempelkan, simpan alamatnya pada input konten" },
        { id: "6", badge: "Bulan 06", title: "Angsuran Bulan ke-6", desc: "upload bukti pembayaran pada GDrive, bagikan public dan tempelkan, simpan alamatnya pada input konten" }
    ];

    function getGPS() {
        return new Promise((resolve, reject) => {
            if (!navigator.geolocation) {
                alert("Browser tidak mendukung GPS.");
                reject("Not Supported");
                return;
            }
            navigator.geolocation.getCurrentPosition(
                (pos) => resolve(`${pos.coords.latitude.toFixed(6)}, ${pos.coords.longitude.toFixed(6)}`),
                (err) => {
                    let msg = "Gagal memverifikasi lokasi: ";
                    if (err.code === 1) msg += "Izin GPS ditolak.";
                    else if (err.code === 2) msg += "Sinyal satelit hilang.";
                    else msg += "Timeout.";
                    alert(msg + "\nAktifkan GPS untuk melakukan penandatanganan/konfirmasi transaksi.");
                    reject(err);
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        });
    }

    function getFormattedDate() {
        return new Date().toLocaleString('id-ID', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' }).replace(/\./g, ':');
    }

    function formatImgUrl(url) {
        if (!url) return "";
        if (url.includes("drive.google.com")) {
            let id = url.split("/file/d/")[1]?.split("/")[0] || url.split("id=")[1]?.split("&")[0];
            return id ? `https://drive.google.com/thumbnail?id=${id}&sz=w1000` : url;
        }
        return url;
    }

    function renderWorkflow() {
        document.getElementById('workflow').innerHTML = stepsTemplate.map(step => `
            <div class="step-card" id="card-${step.id}" onclick="handleInteraction('${step.id}')">
                <div class="status-badge">${step.badge}</div>
                <div class="step-number">${step.id === '6' ? 'M6' : step.id}</div>
                <div class="step-content">
                    <h3>${step.title}</h3>
                    <p>${step.desc}</p>
                    <div class="gps-display" id="gps-val-${step.id}">📍 Menunggu penandaan lokasi setoran...</div>
                    <div class="action-row" onclick="event.stopPropagation()">
                        <div class="link-input-group">
                            <input type="text" class="link-input-small" id="l1-${step.id}" placeholder="Link Bukti Utama">
                            <button class="btn-save-link" id="btn-save-${step.id}" onclick="saveLinks('${step.id}')">INPUT</button>
                        </div>
                        <div class="image-preview-container" id="preview-${step.id}"></div>
                    </div>
                    <div class="timestamp-active" id="ts-act-${step.id}"></div>
                </div>
            </div>
        `).join('');
    }

    async function updateProjectUI() {
        try {
            const res = await fetch(`${CONFIG.URL}/keys/${CONFIG.PREFIX}*`, { 
                headers: { Authorization: `Bearer ${CONFIG.TOKEN}` },
                cache: 'no-store' 
            });
            const keys = (await res.json()).result;
            
            if (!keys || keys.length === 0) {
                document.getElementById('project-name-display').innerText = "BELUM ADA DATA ANGSURAN AKTIF";
                updateProgressBar(0);
                renderWorkflow();
                return;
            }

            keys.sort((a, b) => b.localeCompare(a));
            const valRes = await fetch(`${CONFIG.URL}/get/${keys[0]}`, { 
                headers: { Authorization: `Bearer ${CONFIG.TOKEN}` },
                cache: 'no-store'
            });
            
            const rawData = (await valRes.json()).result;
            if(!rawData) return;
            
            const data = JSON.parse(rawData);
            currentActiveProject = { key: keys[0], ...data };
            
            document.getElementById('project-name-display').innerText = `1030003720022 ${data.client}`;
            syncUI(data.steps);
        } catch (e) { 
            console.error("Sync Error:", e); 
        }
    }

    function updateProgressBar(percent) {
        document.getElementById('completion-bar').style.width = percent + "%";
        document.getElementById('percent-label').innerText = `PROGRESS: ${percent}%`;
    }

    function syncUI(steps) {
        if(!steps) return;
        let completedSteps = 0;
        const totalSteps = stepsTemplate.length;

        stepsTemplate.forEach(step => {
            const card = document.getElementById(`card-${step.id}`);
            const data = steps[step.id];
            if (!card) return;
            
            if (data?.status === 1) {
                completedSteps++;
                card.classList.add('interacted');
                card.classList.remove('verification-active');
                document.getElementById(`gps-val-${step.id}`).innerText = ` ${data.gps || 'Unknown'}`;
                document.getElementById(`ts-act-${step.id}`).innerText = `PAID AT: ${data.time}`;
                
                if(data.link1) document.getElementById(`l1-${step.id}`).value = data.link1;

                const previewBox = document.getElementById(`preview-${step.id}`);
                previewBox.innerHTML = "";
                if (data.link1 && data.link1.trim() !== "") {
                    const img = document.createElement('img');
                    img.src = formatImgUrl(data.link1.trim());
                    img.className = "preview-img";
                    img.onclick = () => window.open(data.link1, '_blank');
                    previewBox.appendChild(img);
                }
            } else {
                card.classList.remove('interacted');
                // SINKRONISASI AKTIF: Mengunci efek pulse berkedip merah HANYA untuk Bulan ke-6 
                if (step.id === "6") { 
                    card.classList.add('verification-active');
                } else {
                    card.classList.remove('verification-active');
                }
            }
        });

        const percentage = Math.round((completedSteps / totalSteps) * 100);
        updateProgressBar(percentage);

        const issue = steps.ISSUE;
        const issueCard = document.getElementById('issue-card-main');
        if (issue?.text) {
            issueCard.classList.add('has-issue');
            document.getElementById('issue-desc-main').innerText = issue.text;
        } else {
            issueCard.classList.remove('has-issue');
            document.getElementById('issue-desc-main').innerText = "Status pembayaran periode berjalan normal (Lancar).";
        }
    }

    async function handleInteraction(id) {
        if (!currentActiveProject || (currentActiveProject.steps[id] && currentActiveProject.steps[id].status === 1)) return;
        try {
            const loc = await getGPS();
            currentActiveProject.steps[id] = { 
                status: 1, 
                time: getFormattedDate(), 
                gps: loc,
                link1: document.getElementById(`l1-${id}`).value,
                link2: ""
            };
            await pushToDB();
            updateProjectUI();
        } catch (e) {
            console.error(e);
        }
    }

    async function saveLinks(id) {
        if (!currentActiveProject) return;
        try {
            let loc = (currentActiveProject.steps[id] && currentActiveProject.steps[id].gps) ? currentActiveProject.steps[id].gps : "";
            if (!loc) {
                loc = await getGPS();
            }
            const l1 = document.getElementById(`l1-${id}`).value;
            
            currentActiveProject.steps[id] = { 
                status: 1, 
                time: currentActiveProject.steps[id]?.time || getFormattedDate(), 
                gps: loc, 
                link1: l1, 
                link2: "" 
            };
            await pushToDB();
            updateProjectUI();
            alert(`Data angsuran Bulan ${id} berhasil diperbarui.`);
        } catch (e) {
            console.error(e);
        }
    }

    async function saveIssue() {
        if (!currentActiveProject) return;
        const text = document.getElementById('issue-text-input').value.trim();
        currentActiveProject.steps["ISSUE"] = { text, time: getFormattedDate() };
        await pushToDB();
        document.getElementById('issue-text-input').value = "";
        updateProjectUI();
    }

    async function pushToDB() {
        let completedSteps = 0;
        const totalSteps = stepsTemplate.length;
        
        stepsTemplate.forEach(step => {
            if (currentActiveProject.steps[step.id] && currentActiveProject.steps[step.id].status === 1) {
                completedSteps++;
            }
        });

        const currentProgress = Math.round((completedSteps / totalSteps) * 100);

        await fetch(`${CONFIG.URL}/set/${currentActiveProject.key}`, {
            method: 'POST', headers: { Authorization: `Bearer ${CONFIG.TOKEN}` },
            body: JSON.stringify({ 
                client: currentActiveProject.client, 
                steps: currentActiveProject.steps,
                progress: currentProgress
            })
        });
    }

    function openModal() { document.getElementById('projectModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('projectModal').style.display = 'none'; }

    async function confirmProject() {
        const name = document.getElementById('clientInput').value.toUpperCase().trim();
        if(!name) return;
        const steps = { ISSUE: { text: "", time: "" } };
        stepsTemplate.forEach(s => steps[s.id] = { status:0, time:"", gps:"", link1:"", link2:"" });
        
        await fetch(`${CONFIG.URL}/set/${CONFIG.PREFIX}${name}`, {
            method: 'POST', headers: { Authorization: `Bearer ${CONFIG.TOKEN}` },
            body: JSON.stringify({ client: name, steps: steps, progress: 0 })
        });
        document.getElementById('clientInput').value = "";
        closeModal(); 
        updateProjectUI();
    }

    async function deleteLatestProject() {
        if (currentActiveProject && confirm(`Hapus riwayat "${currentActiveProject.client}" ini?`)) {
            await fetch(`${CONFIG.URL}/del/${currentActiveProject.key}`, { 
                method: 'POST', 
                headers: { Authorization: `Bearer ${CONFIG.TOKEN}` } 
            });
            currentActiveProject = null;
            updateProjectUI();
        }
    }

    document.addEventListener('DOMContentLoaded', () => { 
        renderWorkflow(); 
        updateProjectUI(); 
    });

    setInterval(() => {
        updateProjectUI();
    }, 7000);
</script>
</body>
</html>
