<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RuangNyata</title>
    <style>
        /* --- RESET & VARIABLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        :root {
            --bg-primary: #121614;
            --bg-card: rgba(255, 255, 255, 0.03);
            --accent-wood: #b58252;
            --accent-fabric: #4a6b5d;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* --- NAVBAR --- */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 15px 5%; /* Sedikit dikurangi agar navbar tidak terlalu tebal karena ada logo */
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
        }

        /* Perbaikan flexbox pada logo agar gambar & text sejajar horizontal */
        .logo {
            display: flex;
            align-items: center;
            gap: 12px; /* Jarak antara gambar logo dan teks */
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--text-main);
            text-transform: uppercase;
        }

        .logo img {
            height: 100px; /* Ukuran tinggi logo yang ideal untuk navbar */
            width: auto;
            object-fit: contain;
        }

        .logo span { 
            color: var(--accent-wood); 
                 }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
        }
        
        .nav-links a:hover, .nav-links a.active {
            color: var(--text-main);
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        /* --- HERO SECTION --- */
        .hero {
            height: 150vh;
            display: flex;
            align-items: center;
            padding: 0 5%;
            position: relative;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0)), url('https://lh3.googleusercontent.com/u/0/d/1CBwiD06r3CJ0BGB0BmJqiXO-1b_yTT1c') center/cover no-repeat;
        }

        .hero-content {
            max-width: 600px;
            z-index: 2;
        }

        .hero-content h1 {
            font-size: 3.5rem;
            line-height: 1.2;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .hero-content p {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        /* BUTTON GLOWING */
        .btn-interactive {
            display: inline-block;
            padding: 15px 35px;
            background: transparent;
            color: var(--text-main);
            border: 2px solid var(--accent-wood);
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .btn-interactive::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--accent-wood);
            transition: all 0.4s ease;
            z-index: -1;
        }

        .btn-interactive:hover::before {
            left: 0;
        }

        .btn-interactive:hover {
            box-shadow: 0 0 25px rgba(181, 130, 82, 0.6);
            transform: translateY(-3px);
        }

        /* --- PRODUCT CUSTOMIZER SECTION --- */
        .customizer-section {
            padding: 100px 5%;
            background: #181d1b;
        }

        .section-title {
            text-align: center;
            margin-bottom: 60px;
        }

        .section-title h2 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .section-title p {
            color: var(--text-muted);
        }

        .customizer-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* STATIC DISPLAY (Tilt effect removed) */
        .product-display {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .product-image {
            width: 100%;
            max-width: 400px;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.7));
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .customizer-controls {
            padding: 20px;
        }

        .customizer-controls h3 {
            font-size: 2rem;
            margin-bottom: 15px;
        }

        .price {
            font-size: 1.5rem;
            color: var(--accent-wood);
            font-weight: 700;
            margin-bottom: 25px;
        }

        .option-group {
            margin-bottom: 30px;
        }

        .option-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            color: var(--text-muted);
        }

        /* COLOR & MATERIAL BUTTONS */
        .color-pickers {
            display: flex;
            gap: 15px;
        }

        .color-dot {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }

        .color-dot.active {
            border-color: var(--text-main);
            transform: scale(1.1);
        }

        .dot-c1 { background-color: #dcdddb; }
        .dot-c2 { background-color: #704085; }
        .dot-c3 { background-color: #e77543; }

        /* HERO BG CHANGER INTERACTIVE BUTTONS */
        .bg-switchers {
            position: absolute;
            right: 5%;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
        }

        .bg-btn {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            border: 2px solid var(--glass-border);
            cursor: pointer;
            background-size: cover;
            background-position: center;
        }

        .bg-btn.active {
            border-color: var(--accent-wood);
            transform: scale(1.1);
        }

       /* RESPONSIVE LAYOUT UNTUK MOBILE ANDROID */
        @media (max-width: 768px) {
            nav { padding: 10px 4%; }
            .nav-links { display: none; } /* Menyembunyikan link navbar atas di mobile */
            .customizer-container { grid-template-columns: 1fr; gap: 20px; }
            .hero-content h1 { font-size: 2rem; }
            .hero-content p { font-size: 0.95rem; }
            .bg-switchers { bottom: 20px; top: auto; right: 5%; flex-direction: row; transform: none; }
            .product-image { max-height: 280px; } /* Memastikan gambar muat penuh di satu layar HP */
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">
            <img src="https://drive.google.com/thumbnail?sz=w500&id=1CZ1_KLCaTw56YSy3wH-a3rBJLa0E1nBf" alt="Logo">
            <span>furniture</span>
        </div>
        <ul class="nav-links">
            <li><a href="#" class="active">Utama</a></li>
            <li><a href="#">Koleksi</a></li>
            <li><a href="#">Rancangan</a></li>
        </ul>
    </nav>

    <section class="hero" id="heroBg">
        <div class="hero-content">
            <h1 id="heroTitle">Pengalaman Berkesan <br>di Ruang Anda</h1>
            <p id="heroDesc">Kami merancang bangun furniture bukan sekadar fungsi, melainkan sebuah karya seni interaktif yang mengisi jiwa rumah Anda.</p>
        </div>
    </section>

    <section class="customizer-section" id="customizer">
        <div class="section-title">
            <h2>Interaktif</h2>
            <p></p>
        </div>

        <div class="customizer-container">
            <div class="product-display" id="tiltCard">
                <img src="https://lh3.googleusercontent.com/d/1SacgdbZug4ZkB6IwZSV3lL8lGdmxvNq4" class="product-image" id="productImg">
            </div>
            <div class="customizer-controls">
                <h3 id="productName">Kursi OTTOMAN 50x50x45</h3>
                <div class="price" id="productPrice">Rp 1.500.000</div>
                <p style="color: var(--text-muted); margin-bottom: 25px;"></p>
                
                <div class="option-group">
                    <div class="option-title">Pilih Varian</div>
                    <div class="color-pickers">
                        <div class="color-dot dot-c1 active" onclick="changeVariant('c1', this)"></div>
                        <div class="color-dot dot-c2" onclick="changeVariant('c2', this)"></div>
                        <div class="color-dot dot-c3" onclick="changeVariant('c3', this)"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        // --- 1. DATA KONTEN HERO ---
        const heroData = [   
            {
                bg: "https://lh3.googleusercontent.com/u/0/d/1CBwiD06r3CJ0BGB0BmJqiXO-1b_yTT1c",

            },
            {
                bg: "https://lh3.googleusercontent.com/u/0/d/17rDviRouf0Rh93x23dSe4A2JMhAZ-ubj",
             
            },
            {
                bg: "https://lh3.googleusercontent.com/u/0/d/1Ow_n6k8QhYDMwmZYv4Q04obUeOgnekj1",
              
            }
        ];

        function changeHero(index) {
            const heroBg = document.getElementById('heroBg');
            const heroTitle = document.getElementById('heroTitle');
            const heroDesc = document.getElementById('heroDesc');
            
            heroBg.style.opacity = "0.8";
            
            setTimeout(() => {
                heroBg.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0)), url('${heroData[index].bg}')`;
                heroTitle.innerText = heroData[index].title;
                heroDesc.innerText = heroData[index].desc;
                heroBg.style.opacity = "1";
            }, 200);

            const btns = document.querySelectorAll('.bg-btn');
            btns.forEach(btn => btn.classList.remove('active'));
            if(btns[index]) {
                btns[index].classList.add('active');
            }
        }

        // --- 2. FITUR CUSTOMIZER FURNITURE ---
        const variants = {
            c1: {
                img: "https://lh3.googleusercontent.com/d/1SacgdbZug4ZkB6IwZSV3lL8lGdmxvNq4", 
                name: "Kursi OTTOMAN 50x50x45",
                price: "Rp 1.500.000"
            },
            c2: { 
                img: "https://lh3.googleusercontent.com/d/1TGLBKZOuWchqRpXlELkHIQi1p0Ai176K",
                name: "Kursi OTTOMAN 50x50x45",
                price: "Rp 1.500.000"
            },
            c3: {
                img: "https://lh3.googleusercontent.com/d/1Mv2l-dS1kgU2skxQPZYyoblTwqda5jKc",
                name: "Kursi OTTOMAN 50x50x45",
                price: "Rp 1.500.000"
            }
        };

        function changeVariant(key, element) {
            const imgEl = document.getElementById('productImg');
            const nameEl = document.getElementById('productName');
            const priceEl = document.getElementById('productPrice');

            imgEl.style.transform = 'scale(0.95)';
            imgEl.style.opacity = '0';

            setTimeout(() => {
                imgEl.src = variants[key].img;
                imgEl.style.borderRadius = "15px"; 
                imgEl.style.height = "400px";
                imgEl.style.objectFit = "cover";
                
                nameEl.innerText = variants[key].name;
                priceEl.innerText = variants[key].price;
                
                imgEl.style.transform = 'scale(1)';
                imgEl.style.opacity = '1';
            }, 300);

            document.querySelectorAll('.color-dot').forEach(dot => dot.classList.remove('active'));
            element.classList.add('active');

            if (key === 'c1') {
                changeHero(0);
            } else if (key === 'c2') {
                changeHero(1);
            } else if (key === 'c3') {
                changeHero(2);
            }
        }

        // --- 3. NAVIGATION UTILITY ---
        function scrollToCustomizer() {
            document.getElementById('customizer').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
