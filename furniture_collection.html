<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog</title>
    <!-- Tailwind CSS cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Fonts & Lucide Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 antialiased p-6 md:p-12">

    <div class="max-w-7xl mx-auto">
        <!-- CONTROL BAR (Filter & Info) -->
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8 pb-6 border-b border-gray-200">
            <div>
                <h1 class="text-2xl font-bold tracking-tight text-stone-900">Koleksi Furniture</h1>
                <p class="text-xs text-gray-500 mt-0.5" id="product-count">Menampilkan semua produk</p>
            </div>
            
            <!-- Category Filter Tabs -->
            <div class="flex flex-wrap gap-2" id="filter-buttons">

                <button onclick="filterCategory('sofa')" id="btn-sofa" class="px-4 py-2 text-xs font-semibold rounded-xl bg-white text-gray-600 hover:bg-gray-100 border border-gray-200 transition-all cursor-pointer">Sofa</button>
                <button onclick="filterCategory('bench')" id="btn-bench" class="px-4 py-2 text-xs font-semibold rounded-xl bg-white text-gray-600 hover:bg-gray-100 border border-gray-200 transition-all cursor-pointer">Bench</button>
                <button onclick="filterCategory('bed')" id="btn-bed" class="px-4 py-2 text-xs font-semibold rounded-xl bg-white text-gray-600 hover:bg-gray-100 border border-gray-200 transition-all cursor-pointer">Bed</button>
            </div>
        </div>

        <!-- PRODUCT GRID -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6" id="product-grid">
            <!-- Data produk di-inject via JavaScript -->
        </div>
    </div>

    <!-- DETAIL PRODUCT MODAL -->
    <div id="product-modal" class="fixed inset-0 z-50 bg-black/40 backdrop-blur-xs hidden flex items-center justify-center p-4 transition-opacity duration-300 opacity-0">
        <div class="bg-white rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto shadow-xl relative transform scale-95 transition-transform duration-300">
            <button onclick="closeModal()" class="absolute top-4 right-4 p-2 bg-gray-100 hover:bg-gray-200 rounded-full transition-colors z-10 cursor-pointer">
                <i data-lucide="x" class="w-4 h-4"></i>
            </button>
            <div class="grid grid-cols-1 md:grid-cols-2" id="modal-content">
                <!-- Konten detail di-inject via JavaScript -->
            </div>
        </div>
    </div>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        // Data Koleksi Furnitur Baru: Sofa, Bench, Bed
        const furnitures = [
            {
                id: 1,
                name: "Minimalist Bouclé Sofa",
                category: "sofa",
                categoryLabel: "Sofa",
                price: "Rp 8.750.000",
                image: "https://images.unsplash.com/photo-1555041469-a586c61ea9bc?auto=format&fit=crop&w=600&q=80",
                desc: "Sofa modern dengan balutan kain bouclé premium bertekstur lembut. Desain ergonomis dengan busa ekstra nyaman untuk ruang tamu minimalis Anda."
            },
            {
                id: 2,
                name: "Solid Oak Woven Bench",
                category: "bench",
                categoryLabel: "Bench",
                price: "Rp 2.400.000",
                image: "https://images.unsplash.com/photo-1560185007-c5ca9d2c014d?auto=format&fit=crop&w=600&q=80",
                desc: "Bangku panjang dari kayu ek solid dipadukan dengan anyaman tali kertas (paper cord) alami khas Skandinavia. Cocok untuk area foyer atau ujung tempat tidur."
            },
            {
                id: 3,
                name: "Floating Walnut Bed Frame",
                category: "bed",
                categoryLabel: "Bed",
                price: "Rp 9.800.000",
                image: "https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?auto=format&fit=crop&w=600&q=80",
                desc: "Rangka tempat tidur berbahan kayu walnut solid dengan ilusi melayang. Menampilkan estetika kamar tidur yang rapi, modern, dan berkelas."
            },
            {
                id: 4,
                name: "Velvet 3-Seater Sofa",
                category: "sofa",
                categoryLabel: "Sofa",
                price: "Rp 11.200.000",
                image: "https://images.unsplash.com/photo-1493663284031-b7e3aefcae8e?auto=format&fit=crop&w=600&q=80",
                desc: "Sofa mewah berkapasitas 3 orang berlapis kain beludru halus tahan noda dengan kaki logam ramping bernuansa emas/brass monokrom."
            },
            {
                id: 5,
                name: "Upholstered Storage Bench",
                category: "bench",
                categoryLabel: "Bench",
                price: "Rp 3.150.000",
                image: "https://images.unsplash.com/photo-1595428774223-ef52624120d2?auto=format&fit=crop&w=600&q=80",
                desc: "Bench fungsional yang dilengkapi ruang penyimpanan tersembunyi di bawah dudukan empuk berbalut kain katun linen kustom."
            },
            {
                id: 6,
                name: "Canopy Wooden Bed",
                category: "bed",
                categoryLabel: "Bed",
                price: "Rp 12.500.000",
                image: "https://images.unsplash.com/photo-1540518614846-7eded433c457?auto=format&fit=crop&w=600&q=80",
                desc: "Rangka tempat tidur kanopi dengan struktur tiang kayu minimalis yang kokoh untuk menciptakan suasana ruang tidur yang hangat dan intim."
            }
        ];

        // Fungsi Render Item ke Grid
        function renderProducts(items) {
            const grid = document.getElementById('product-grid');
            const countLabel = document.getElementById('product-count');
            
            countLabel.textContent = `Menampilkan ${items.length} produk`;

            if(items.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-12 text-gray-400 text-sm">Tidak ada produk ditemukan.</div>`;
                return;
            }

            grid.innerHTML = items.map(item => `
                <div class="group bg-white rounded-xl overflow-hidden border border-gray-200/60 shadow-xs hover:shadow-md transition-all flex flex-col justify-between">
                    <div class="relative overflow-hidden bg-gray-100 aspect-square">
                        <img src="${item.image}" alt="${item.name}" class="w-full h-full object-cover group-hover:scale-103 transition-transform duration-300">
                        <span class="absolute top-3 left-3 bg-white/90 backdrop-blur-xs text-[9px] font-bold tracking-wider uppercase px-2 py-0.5 rounded border border-gray-100">
                            ${item.categoryLabel}
                        </span>
                    </div>
                    <div class="p-5 flex-1 flex flex-col justify-between">
                        <div>
                            <h3 class="font-medium text-sm tracking-tight text-stone-900">${item.name}</h3>
                            <p class="text-sm font-semibold text-amber-700 mt-1">${item.price}</p>
                        </div>
                        <button onclick="openModal(${item.id})" class="mt-4 w-full bg-gray-50 hover:bg-stone-900 hover:text-white text-stone-700 font-medium py-2 rounded-lg text-xs transition-all flex items-center justify-center gap-1.5 cursor-pointer">
                            Detail Produk <i data-lucide="arrow-up-right" class="w-3 h-3"></i>
                        </button>
                    </div>
                </div>
            `).join('');
            
            lucide.createIcons();
        }

        // Fungsi Filter Kategori
        function filterCategory(category) {
            const buttons = document.querySelectorAll('#filter-buttons button');
            buttons.forEach(btn => {
                btn.className = "px-4 py-2 text-xs font-semibold rounded-xl bg-white text-gray-600 hover:bg-gray-100 border border-gray-200 transition-all cursor-pointer";
            });

            const activeBtn = document.getElementById(`btn-${category}`);
            if(activeBtn) {
                activeBtn.className = "px-4 py-2 text-xs font-semibold rounded-xl bg-stone-900 text-white shadow-sm transition-all cursor-pointer";
            }

            if (category === 'all') {
                renderProducts(furnitures);
            } else {
                const filtered = furnitures.filter(item => item.category === category);
                renderProducts(filtered);
            }
        }

        // Kontrol Modal Detail
        function openModal(id) {
            const item = furnitures.find(p => p.id === id);
            const modal = document.getElementById('product-modal');
            const content = document.getElementById('modal-content');

            content.innerHTML = `
                <div class="h-64 md:h-full bg-gray-100">
                    <img src="${item.image}" alt="${item.name}" class="w-full h-full object-cover">
                </div>
                <div class="p-6 md:p-8 flex flex-col justify-between">
                    <div>
                        <span class="text-[10px] font-bold tracking-widest uppercase text-amber-700">${item.categoryLabel}</span>
                        <h2 class="text-xl font-bold text-stone-900 mt-0.5">${item.name}</h2>
                        <p class="text-base font-semibold text-stone-800 mt-1.5">${item.price}</p>
                        <p class="text-xs text-gray-500 mt-4 leading-relaxed">${item.desc}</p>
                    </div>
                    <div class="mt-6">
<a href="https://wa.me/6287796126529" target="_blank" class="w-full bg-stone-900 hover:bg-stone-800 text-white font-medium py-2.5 rounded-xl text-xs transition-all flex items-center justify-center gap-2 cursor-pointer">
    Hubungi Penjual
</a>
                        </button>
                    </div>
                </div>
            `;

            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.querySelector('.transform').classList.remove('scale-95');
            }, 10);
            
            lucide.createIcons();
        }

        function closeModal() {
            const modal = document.getElementById('product-modal');
            modal.classList.add('opacity-0');
            modal.querySelector('.transform').classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        // Close modal jika area luar diklik
        document.getElementById('product-modal').addEventListener('click', function(e) {
            if(e.target === this) closeModal();
        });

        // Load data saat dokumen siap
        document.addEventListener("DOMContentLoaded", () => {
            renderProducts(furnitures);
            lucide.createIcons();
        });
    </script>
</body>
</html>
