<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>furniture</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
      /* --- RESET & VARIABLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        :root {
            --bg-primary: #121614;
            --bg-card: rgba(255, 255, 255, 0.03);
            --accent-wood: #b58252;
            --accent-fabric: #4a6b5d;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --glass-border: rgba(255, 255, 255, 0.08);
            
            /* Variabel Warna Utama Kode Kedua (Nuansa Biru) */
            --blue-light: #2575fc; 
            --blue-dark: #6a11cb;  
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* --- NAVBAR --- */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--text-main);
            text-transform: uppercase;
        }

        .logo img {
            height: 100px; 
            width: auto;
            object-fit: contain;
        }

        .logo span { 
            color: var(--accent-wood); 
            text-stroke: 2px black;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
        }
        
        .nav-links a:hover, .nav-links a.active {
            color: var(--text-main);
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        /* --- HERO SECTION --- */
        .hero {
            height: 70vh; 
            display: flex;
            align-items: center;
            padding: 0 5%;
            position: relative;
            /* Memberikan overlay gelap tipis di atas gambar agar teks putih bawaan HTML Anda tetap terbaca */
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0)), url('https://lh3.googleusercontent.com/u/0/d/1CBwiD06r3CJ0BGB0BmJqiXO-1b_yTT1c') center/cover no-repeat;
        }

        .hero-content2 {
            max-width: 600px;
            z-index: 2;
        }

        .hero-content2 h1 {
            font-size: 3.5rem;
            line-height: 1.2;
            margin-bottom: 20px;
            font-weight: 700;
            color: #ffffff;
        }

        .hero-content2 p {
            color: #ffffff;
            margin-bottom: 30px;
            font-size: 1.1rem;
            opacity: 0.9;
        }

        /* --- BUTTON HORIZONTAL ROW SECTION --- */
        .button-grid-section {
            padding: 40px 0px 0px 0px;
            background-color: #ffffff; /* Mengubah background section galeri menjadi putih */
            overflow: hidden;
        }

        .grid-title {
            text-align: center;
            margin-bottom: 40px;
        }

        .grid-title h2 {
            font-size: 2rem;
            color: var(--text-main);
            letter-spacing: 1px;
        }

        .gallery-scroll-container {
            width: 100%;
            overflow-x: auto;
            padding-bottom: 15px;
            cursor: grab;
            scrollbar-width: none;
            -ms-overflow-style: none;  
        }
        
        .gallery-scroll-container::-webkit-scrollbar {
            display: none;
        }

        .gallery-scroll-container:active {
            cursor: grabbing;
        }

        .gallery-grid {
            display: flex;
            gap: 20px;
            max-width: fit-content;
            margin: 0 auto;
            padding: 0 10px;
        }

        .image-button-custom {
            flex: 0 0 280px; 
            height: 200px;
            border: 2px solid var(--glass-border);
            border-radius: 12px;
            cursor: pointer;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); /* Mengurangi kepekatan shadow agar clean */
        }

        .image-button-custom::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.1);
            transition: background 0.3s ease;
        }

        .image-button-custom:hover::after {
            background: rgba(0, 0, 0, 0);
        }

        .image-button-custom:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: var(--accent-wood);
        }

        .image-button-custom:active {
            transform: scale(0.98);
        }

        #btn1 { background-image: url('https://lh3.googleusercontent.com/u/0/d/1vCfbGQDMCYf7-ZHwiXpJocvLrj0RdcfC'); }
        #btn2 { background-image: url('https://lh3.googleusercontent.com/u/0/d/1Mz9DOi5p26YfOnGOUCodITwOlb6qvfJO'); }
        #btn3 { background-image: url('https://lh3.googleusercontent.com/u/0/d/1nsyFw4kqSnte-8pCBLWRX8YOuH5LUtl7'); }
        #btn4 { background-image: url('https://lh3.googleusercontent.com/u/0/d/1pGH1tLNbRNezO8f9Y73O0FJreCKIxkz6'); }
        #btn5 { background-image: url('https://lh3.googleusercontent.com/u/0/d/1kOzkN4OhZY2COrQuF6UM-TIU9dylmING'); }

        /* --- MODAL SYSTEM --- */
        .modal-custom {
            display: none;             
            position: fixed;           
            z-index: 2000;             
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(255, 255, 255, 0.95); /* Mengubah backdrop modal menjadi putih transparan */
            backdrop-filter: blur(5px);
            justify-content: center;   
            align-items: center;  
        }

        .modal-content-custom {
            max-width: 85%;
            max-height: 80vh;
            border-radius: 12px;
            border: 1px solid rgba(0,0,0,0.1); /* Border modal disesuaikan */
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); /* Shadow modal dibuat lebih smooth */
            animation: zoomIn 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); 
            object-fit: contain;
        }

        .close-btn-custom {
            position: absolute;
            top: 25px;
            right: 40px;
            color: #111827; /* Tombol close diubah menjadi gelap */
            font-size: 45px;
            font-weight: 300;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-btn-custom:hover {
            color: var(--accent-wood);
        }

        @keyframes zoomIn {
            from { transform: scale(0.92); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* --- PRODUCT CUSTOMIZER SECTION --- */
        .customizer-section {
            padding: 80px 5% 40px 5%; 
            background: #ffffff; /* Tetap putih bersih */
        }

        .section-title {
            text-align: center;
            margin-bottom: 60px;
        }

        .section-title h2 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #111827;
        }

        .customizer-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .product-display {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .product-image {
            width: 100%;
            max-width: 400px;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.08));
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .customizer-controls {
            padding: 20px;
        }

        .customizer-controls h3 {
            font-size: 1.8rem;
            margin-bottom: 15px;
            color: #111827;
        }

        .furniture-list {
            list-style: none;
            margin-bottom: 20px;
        }

        .furniture-list li {
            font-size: 1.1rem;
            margin-bottom: 12px;
            color: #111827;
            white-space: pre-line;
        }

        .price {
            font-size: 1.5rem;
            color: var(--accent-wood);
            font-weight: 700;
            margin-bottom: 25px;
        }

        .option-group {
            margin-bottom: 0px; 
        }

        .option-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            color: var(--text-muted);
        }

        .color-pickers {
            display: flex;
            gap: 15px;
        }

        .color-dot {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .color-dot.active {
            border-color: #111827;
            transform: scale(1.1);
        }

        .dot-c1 { background-color: #dcdddb; border: 1px solid #ccc; }
        .dot-c2 { background-color: #704085; }
        .dot-c3 { background-color: #e77543; }

        /* --- FOOTER BUTTON --- */
        .button-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 0 60px 0; 
            background-color: #ffffff; /* Tetap putih bersih */
        }

        .btn-web-animated {
            background: linear-gradient(45deg, var(--blue-light), var(--blue-dark));
            box-shadow: 0 0 15px rgba(37, 117, 252, 0.3);
            animation: pulse-web-main 2s infinite;
            width: 250px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
            border: none;
            color: white;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            letter-spacing: 1px;
        }

        .btn-web-animated:hover {
            transform: scale(1.05);
        }

        @keyframes pulse-web-main {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(37, 117, 252, 0.5); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(37, 117, 252, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(37, 117, 252, 0); }
        }

        /* --- AUDIO INTERACTION OVERLAY --- */
        #interaction-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.02); /* Dikurangi opacity-nya agar transparan bersih */
            z-index: 9999;
            cursor: pointer;
        }

        /* --- RESPONSIVE LAYOUT --- */
        @media (max-width: 768px) {
            nav { 
                padding: 10px 20px;
                background-color: rgba(255, 255, 255, 0.9); /* Transparansi mobile disesuaikan ke putih */
            }
            
            .nav-links { display: none; } 
            
            .image-button-custom {
                flex: 0 0 220px; 
                height: 160px;
            }
            
            .customizer-container { 
                grid-template-columns: 1fr; 
                gap: 30px;
            }
            
            .hero-content2 h1 { font-size: 2.2rem; } 
            .product-image { max-height: 320px; } 
            
            .hero { 
                height: 50vh;  
            }
        }
    </style>
</head>
<body>

    <div id="interaction-overlay"></div>

    <audio id="myAudio">
        <source src="https://firstian84.github.io/firstiantechnology/middle.m4a" type="audio/mpeg">
    </audio>

    <nav>
        <div class="logo">
            <img src="https://drive.google.com/thumbnail?sz=w500&id=1CZ1_KLCaTw56YSy3wH-a3rBJLa0E1nBf" alt="Logo">
            <span>furniture</span>
        </div>
        <ul class="nav-links">
            <li><a href="#" class="active">Utama</a></li>
            <li><a href="#">Koleksi</a></li>
            <li><a href="#">Rancangan</a></li>
        </ul>
    </nav>

    <section class="hero" id="heroBg">
        <div class="hero-content2">
            <h1 id="heroTitle">Pengalaman Berkesan <br>di Ruang Anda</h1>
            <p id="heroDesc">Kami merancang bangun furniture bukan sekadar fungsi, melainkan sebuah karya seni interaktif yang mengisi jiwa rumah Anda.</p>
        </div>
    </section>

    <section class="button-grid-section">
        <div class="grid-title"></div>
        
        <div class="gallery-scroll-container" id="scrollContainer">
            <div class="gallery-grid">
                <button class="image-button-custom" id="btn1" onclick="openVisualModal('https://lh3.googleusercontent.com/u/0/d//1vCfbGQDMCYf7-ZHwiXpJocvLrj0RdcfC')"></button>
                <button class="image-button-custom" id="btn2" onclick="openVisualModal('https://lh3.googleusercontent.com/u/0/d/1Mz9DOi5p26YfOnGOUCodITwOlb6qvfJO')"></button>
                <button class="image-button-custom" id="btn3" onclick="openVisualModal('https://lh3.googleusercontent.com/u/0/d//1nsyFw4kqSnte-8pCBLWRX8YOuH5LUtl7')"></button>
                <button class="image-button-custom" id="btn4" onclick="openVisualModal('https://lh3.googleusercontent.com/u/0/d/1pGH1tLNbRNezO8f9Y73O0FJreCKIxkz6')"></button>
                <button class="image-button-custom" id="btn5" onclick="openVisualModal('https://lh3.googleusercontent.com/u/0/d/1kOzkN4OhZY2COrQuF6UM-TIU9dylmING')"></button>
            </div>
        </div>
    </section>

    <div id="unifiedModal" class="modal-custom" onclick="closeVisualModal(event)">
        <span class="close-btn-custom" onclick="forceCloseModal()">×</span>
        <img class="modal-content-custom" id="modalTargetImg" src="" alt="Preview Visual">
    </div>

    <section class="customizer-section" id="customizer">
        <div class="section-title">
            <h2>Interaktif Pilihan</h2>
        </div>

        <div class="customizer-container">
            <div class="product-display" id="tiltCard">
                <img src="https://lh3.googleusercontent.com/d/1SacgdbZug4ZkB6IwZSV3lL8lGdmxvNq4" class="product-image" id="productImg" alt="Product Layout">
            </div>
            <div class="customizer-controls">
                <h3 id="productName">Koleksi Eksklusif</h3>
                
                <ul class="furniture-list" id="furnitureList"></ul>

                <div class="price" id="productPrice">Total Paket: Rp21.000.000</div>
                
                <div class="option-group">
                    <div class="option-title">Pilih Varian</div>
                    <div class="color-pickers">
                        <div class="color-dot dot-c1 active" onclick="changeVariant('c1', this)"></div>
                        <div class="color-dot dot-c2" onclick="changeVariant('c2', this)"></div>
                        <div class="color-dot dot-c3" onclick="changeVariant('c3', this)"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div class="button-wrapper">
        <button onclick="openLink()" class="btn-web-animated" title="Mulai Diskusi RND PO">
            DISKUSI RnD P.O
        </button>
    </div>

    <script>
        // --- 1. HERO SLIDESHOW MATRIX DATA ---
        const heroData = [   
            {
                bg: "https://lh3.googleusercontent.com/u/0/d/1CBwiD06r3CJ0BGB0BmJqiXO-1b_yTT1c",
                title: "Pengalaman Berkesan di Ruang Anda",
                desc: "Kami merancang bangun furniture bukan sekadar fungsi, melainkan sebuah karya seni yang mengisi jiwa rumah Anda."
            },
            {
                bg: "https://lh3.googleusercontent.com/u/0/d/17rDviRouf0Rh93x23dSe4A2JMhAZ-ubj",
                title: "",
                desc: ""
            },
            {
                bg: "https://lh3.googleusercontent.com/u/0/d/1Ow_n6k8QhYDMwmZYv4Q04obUeOgnekj1",
                title: "",
                desc: ""
            }
        ];

        function changeHero(index) {
            const heroBg = document.getElementById('heroBg');
            const heroTitle = document.getElementById('heroTitle');
            const heroDesc = document.getElementById('heroDesc');
            
            heroBg.style.opacity = "0.8";
            
            setTimeout(() => {
                heroBg.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0)), url('${heroData[index].bg}')`;
                heroTitle.innerText = heroData[index].title;
                heroDesc.innerText = heroData[index].desc;
                heroBg.style.opacity = "1";
            }, 200);
        }

        // --- 2. CONFIG VARIANT INTERACTION ---
        const variants = {
            c1: {
                img: "https://lh3.googleusercontent.com/d/1SacgdbZug4ZkB6IwZSV3lL8lGdmxvNq4", 
                name: "",
                items: [
                    "• Ottoman: 50x50x45 \n (Rp1.500.000)",
                    "• Ottoman: 195x50x42 \n (Rp6.500.000)",
                    "• Dipan: 180x200x30 \n (Rp8.000.000)",
                    "• Kepala Dipan: 180x100x10 \n (Rp5.000.000)"
                ],
                price: "Total Paket: Rp21.000.000"
            },
            c2: { 
                img: "https://lh3.googleusercontent.com/d/1TGLBKZOuWchqRpXlELkHIQi1p0Ai176K",
                name: "",
                items: [
                    "• Ottoman: 50x50x45 \n (Rp1.500.000)",
                    "• Ottoman: 195x50x42 \n (Rp6.500.000)",
                    "• Dipan: 180x200x30 \n (Rp8.000.000)",
                    "• Kepala Dipan: 180x100x10 \n (Rp5.000.000)"
                ],
                price: "Total Paket: Rp21.000.000"
            },
            c3: {
                img: "https://lh3.googleusercontent.com/d/1Mv2l-dS1kgU2skxQPZYyoblTwqda5jKc",
                name: "",
                items: [
                    "• Ottoman: 50x50x45 \n (Rp1.500.000)",
                    "• Ottoman: 195x50x42 \n (Rp6.500.000)",
                    "• Dipan: 180x200x30 \n (Rp8.000.000)",
                    "• Kepala Dipan: 180x100x10 \n (Rp5.000.000)"
                ],
                price: "Total Paket: Rp21.000.000"
            }
        };

        function changeVariant(key, element) {
            const imgEl = document.getElementById('productImg');
            const nameEl = document.getElementById('productName');
            const priceEl = document.getElementById('productPrice');
            const listEl = document.getElementById('furnitureList');

            imgEl.style.transform = 'scale(0.95)';
            imgEl.style.opacity = '0';

            setTimeout(() => {
                imgEl.src = variants[key].img;
                imgEl.style.borderRadius = "15px"; 
                imgEl.style.height = "400px";
                imgEl.style.objectFit = "cover";
                
                nameEl.innerText = variants[key].name;
                priceEl.innerText = variants[key].price;
                
                listEl.innerHTML = "";
                variants[key].items.forEach(itemText => {
                    const li = document.createElement('li');
                    li.innerText = itemText;
                    listEl.appendChild(li);
                });
                
                imgEl.style.transform = 'scale(1)';
                imgEl.style.opacity = '1';
            }, 300);

            document.querySelectorAll('.color-dot').forEach(dot => dot.classList.remove('active'));
            element.classList.add('active');

            if (key === 'c1') changeHero(0);
            else if (key === 'c2') changeHero(1);
            else if (key === 'c3') changeHero(2);
        }

        // --- 3. UNIFIED MODAL CORE CONTROLLER ---
        const uModal = document.getElementById('unifiedModal');
        const modalTargetImg = document.getElementById('modalTargetImg');

        function openVisualModal(imgUrl) {
            modalTargetImg.src = imgUrl;
            uModal.style.display = 'flex';
        }

        function closeVisualModal(event) {
            if (event.target === uModal) {
                uModal.style.display = 'none';
            }
        }

        function forceCloseModal() {
            uModal.style.display = 'none';
        }

        // --- 4. REDIRECTION ACTION ---
        function openLink() { 
            window.open("https://firstian84.github.io/firstiantechnology/tech.html", "_blank"); 
        }

        // --- 5. AUDIO SCHEDULER ENGINE ---
        const audio = document.getElementById('myAudio');
        const overlay = document.getElementById('interaction-overlay');
        const delayBetweenLoops = 10000; 

        function setupDelayedLoop() {
            audio.addEventListener('ended', function() {
                console.log("Audio putaran selesai. Istirahat 10 detik...");
                setTimeout(function() {
                    audio.currentTime = 0; 
                    audio.play().catch(err => console.log("Gagal memutar ulang:", err));
                }, delayBetweenLoops);
            });
        }

        // --- 6. DRAG-TO-SCROLL MOUSE INTERACTION FOR HORIZONTAL LAYOUT ---
        const slider = document.getElementById('scrollContainer');
        let isDown = false;
        let startX;
        let scrollLeft;

        slider.addEventListener('mousedown', (e) => {
            isDown = true;
            slider.classList.add('active');
            startX = e.pageX - slider.offsetLeft;
            scrollLeft = slider.scrollLeft;
        });
        slider.addEventListener('mouseleave', () => {
            isDown = false;
        });
        slider.addEventListener('mouseup', () => {
            isDown = false;
        });
        slider.addEventListener('mousemove', (e) => {
            if(!isDown) return;
            e.preventDefault();
            const x = e.pageX - slider.offsetLeft;
            const walk = (x - startX) * 1.5; 
            slider.scrollLeft = scrollLeft - walk;
        });

        // --- 7. WINDOW BOOTSTRAP INITIALIZER ---
        window.onload = function() {
            changeVariant('c1', document.querySelector('.dot-c1'));

            overlay.addEventListener('click', function() {
                overlay.style.display = 'none'; 
                setupDelayedLoop();
                
                audio.play()
                    .then(() => console.log("Audio Stream Aktif."))
                    .catch(err => {
                        console.error("Gagal melakukan inisiasi audio:", err);
                    });
            });
        };
    </script>
</body>
</html>
