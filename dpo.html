<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T.O POLRI</title>
    
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.108/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.108/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    
    <style>
        :root {
            --primary-red: #ff3b3b;
            --ui-bg: rgba(15, 15, 15, 0.7); 
            --card-bg: rgba(255, 255, 255, 0.05); 
            --accent-glow: #ff0000;
            --text-main: rgba(255, 255, 255, 0.9);
            --text-sub: rgba(255, 255, 255, 0.5);
            --gmaps-blue: #4285F4;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; overflow: hidden; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: #000; color: white; 
        }
        
        #cesiumContainer { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; 
        }

        .cesium-viewer-toolbar {
            right: 390px !important; 
            top: 10px !important;
        }

        /* --- SIDEBAR UI --- */
        .sidebar { 
            position: absolute; 
            right: 0; 
            top: 0; 
            width: 380px; 
            height: 100%;
            background: var(--ui-bg); 
            display: flex; 
            flex-direction: column;
            border-left: 1px solid rgba(255, 255, 255, 0.1); 
            z-index: 10; 
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }

        /* --- UPDATED HEADER STYLE --- */
        .header { 
            padding: 25px 20px; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
        }

        .header h2 { 
            margin: 0; 
            letter-spacing: 1px; 
            font-weight: 600; 
            line-height: 1.4;
            color: var(--text-main);
            text-align: center;
        }

        .unit-name {
            font-size: 10px; 
            opacity: 0.8;
            font-weight: 400;
            display: block; 
            margin-bottom: 2px;
            text-transform: uppercase;
        }

        .polda-name {
            font-size: 20px; 
            font-weight: 800;
            display: block;
            text-transform: uppercase;
        }

        .target-name { 
            color: var(--primary-red); 
            font-weight: 800; 
            font-size: 18px;
            text-shadow: 0 0 10px var(--accent-glow); 
            display: block;
            margin-top: 5px;
            text-transform: uppercase;
        }

        /* --- OTHER UI ELEMENTS --- */
        .scroll-container { flex: 1; overflow-y: auto; padding: 15px; }
        .scroll-container::-webkit-scrollbar { width: 4px; }
        .scroll-container::-webkit-scrollbar-thumb { background: var(--primary-red); }

        .property-card {
            background: var(--card-bg); border-radius: 12px; margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1); overflow: hidden; transition: 0.3s;
        }

        .property-card.active { 
            border-color: var(--primary-red); 
            background: rgba(255, 59, 59, 0.1); 
            box-shadow: 0 0 15px rgba(255, 59, 59, 0.2);
        }

        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; background: #000; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .card-content { padding: 15px; }
        .card-content h3 { 
            margin: 0 0 8px 0; font-size: 13px; color: var(--text-main); font-weight: 600;
        }
        
        .coords-label { 
            color: var(--text-sub); font-size: 11px; display: block; 
            margin-bottom: 15px; font-family: 'Courier New', monospace; 
        }

        .button-group { display: flex; gap: 10px; width: 100%; }

        .btn { 
            flex: 1; border: none; border-radius: 6px; cursor: pointer; 
            font-weight: 600; padding: 12px 5px; font-size: 11px; 
            transition: 0.2s; display: flex; align-items: center;
            justify-content: center; gap: 8px; text-decoration: none;
            color: white; text-transform: uppercase;
        }
        
        .btn-go { background: var(--primary-red); }
        .btn-go:hover { background: #ff5c5c; box-shadow: 0 0 15px var(--accent-glow); }
        .btn-go svg { fill: white; width: 16px; height: 16px; }

        .btn-maps { background: var(--gmaps-blue); }
        .btn-maps:hover { background: #357ae8; box-shadow: 0 0 15px rgba(66, 133, 244, 0.4); }
        .btn-maps svg { fill: white; width: 16px; height: 16px; }

        .map-instruction {
            position: absolute; top: 15px; right: 440px; z-index: 20;
            display: flex; align-items: center; pointer-events: none;
            animation: pulse-glow 2s infinite;
        }

        .instruction-text {
            background: rgba(255, 59, 59, 0.8); color: white; padding: 8px 15px;
            border-radius: 4px; font-size: 12px; font-weight: bold;
            text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
        }

        @keyframes pulse-glow {
            0% { opacity: 0.6; transform: translateX(0); }
            50% { opacity: 1; transform: translateX(5px); }
            100% { opacity: 0.6; transform: translateX(0); }
        }

        .cesium-viewer-bottom { display: none !important; }

        @media (max-width: 768px) {
            #cesiumContainer { height: 40%; position: relative; }
            .sidebar { position: relative; width: 100%; height: 60%; border-left: none; border-top: 2px solid var(--primary-red); }
            .map-instruction { right: 60px; top: 50px; }
        }
    </style>
</head>
<body>

    <div id="cesiumContainer"></div>

    <div class="map-instruction">
        <div class="instruction-text">PILIH TOMBOL INI > OTHER > ARCGIS WORLD IMAGERY</div>
    </div>

    <div class="sidebar">
        <div class="header">
            <h2>
                <span class="unit-name">KEPOLISIAN NEGARA REPUBLIK INDONESIA</span>
                <span class="polda-name">POLDA METRO JAYA</span>
                <span class="target-name">TARGET OPERASI D.P.O</span>
            </h2>
        </div>
        <div id="propertyList" class="scroll-container"></div>
    </div>

<script>
    const viewer = new Cesium.Viewer('cesiumContainer', {
        terrainProvider: new Cesium.EllipsoidTerrainProvider(),
        animation: false,
        timeline: false,
        infoBox: false,
        selectionIndicator: false,
        navigationHelpButton: false,
        baseLayerPicker: true, 
        geocoder: true,
        homeButton: true,
        sceneModePicker: true
    });

    const manualProperties = [
        { name: "..................", coords: [0,0], ytId: ".................." },
        { name: "..................", coords: [0,0], ytId: ".................." }
    ];

    function renderList() {
        const container = document.getElementById('propertyList');
        container.innerHTML = '';
        manualProperties.forEach((prop, index) => {
            const [lat, lng] = prop.coords;
            const card = document.createElement('div');
            card.className = 'property-card';
            card.id = `card-${index}`;
            card.innerHTML = `
                <div class="video-wrapper">
                    <iframe src="https://www.youtube.com/embed/${prop.ytId}?mute=1&loop=1&playlist=${prop.ytId}" allowfullscreen></iframe>
                </div>
                <div class="card-content">
                    <h3>${prop.name}</h3>
                    <span class="coords-label">COORD: ${lat.toFixed(6)}, ${lng.toFixed(6)}</span>
                    <div class="button-group">
                        <button class="btn btn-go" onclick="focusMap(${lat}, ${lng}, ${index})">TRACK</button>
                        <a href="https://www.google.com/maps?q=${lat},${lng}" target="_blank" class="btn btn-maps">MAPS</a>
                    </div>
                </div>`;
            container.appendChild(card);
        });
    }

    function focusMap(lat, lng, index) {
        viewer.entities.removeAll(); 
        document.querySelectorAll('.property-card').forEach(c => c.classList.remove('active'));
        const activeCard = document.getElementById(`card-${index}`);
        if(activeCard) activeCard.classList.add('active');

        viewer.camera.flyTo({
            destination: Cesium.Cartesian3.fromDegrees(lng, lat, 500),
            duration: 2
        });
    }

    renderList();
    viewer.camera.setView({ destination: Cesium.Cartesian3.fromDegrees(106.82, -6.25, 20000) });
</script>
</body>
</html>
