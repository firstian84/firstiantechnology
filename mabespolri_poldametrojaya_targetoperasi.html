<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TARGET OPERASI POLRI </title>
    
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.108/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.108/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    
    <style>
        :root {
            --primary-red: #ff3b3b;
            --ui-bg: rgba(15, 15, 15, 0.9); 
            --card-bg: rgba(255, 255, 255, 0.05); 
            --accent-glow: #ff0000;
            --text-main: rgba(255, 255, 255, 0.9);
            --text-sub: rgba(255, 255, 255, 0.5);
            --gmaps-blue: #4285F4;
        }

        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; background: #000; color: white; }
        #cesiumContainer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        /* UI Overlay */
        .ui-tactical {
            position: absolute; top: 20px; left: 20px; z-index: 20;
            color: var(--primary-red); font-family: monospace;
            background: rgba(0,0,0,0.7); padding: 15px; border-left: 4px solid var(--primary-red);
            pointer-events: none;
        }

        .sidebar { 
            position: absolute; right: 0; top: 0; width: 380px; height: 100%;
            background: var(--ui-bg); display: flex; flex-direction: column;
            border-left: 1px solid rgba(255, 255, 255, 0.1); z-index: 10; 
            backdrop-filter: blur(10px);
        }

        .header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: center;}
        .polda-name { font-size: 18px; font-weight: 800; display: block; }
        .target-name { color: var(--primary-red); font-weight: 800; font-size: 16px; margin-top: 5px; display: block; }

        .scroll-container { flex: 1; overflow-y: auto; padding: 15px; }
        .property-card {
            background: var(--card-bg); border-radius: 8px; margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.1); transition: 0.3s;
        }
        .property-card.active { border-color: var(--primary-red); background: rgba(255, 59, 59, 0.15); }

        .card-content { padding: 12px; }
        .coords-label { color: var(--text-sub); font-size: 11px; display: block; margin-bottom: 10px; }

        .button-group { display: flex; gap: 8px; }
        .btn { 
            flex: 1; border: none; border-radius: 4px; cursor: pointer; 
            font-weight: 600; padding: 10px; font-size: 11px; color: white;
            text-align: center; text-decoration: none;
        }
        .btn-go { background: var(--primary-red); }
        .btn-maps { background: var(--gmaps-blue); }

        .cesium-viewer-bottom { display: none !important; }
    </style>
</head>
<body>

    <div id="cesiumContainer"></div>

    <div class="ui-tactical">
        <div style="font-size: 10px; opacity: 0.7;">TACTICAL MONITORING</div>
        <div id="coords-display" style="font-size: 18px; font-weight: bold; letter-spacing: 1px;">0.0000 | 0.0000</div>
    </div>

    <div class="sidebar">
        <div class="header">
            <span class="polda-name">POLDA METRO JAYA</span>
            <span class="target-name">TARGET OPERASI (DPO)</span>
        </div>
        <div id="propertyList" class="scroll-container"></div>
    </div>

<script>
    // Inisialisasi Viewer
    const viewer = new Cesium.Viewer('cesiumContainer', {
        terrainProvider: new Cesium.EllipsoidTerrainProvider(),
        animation: false,
        timeline: false,
        infoBox: false,
        selectionIndicator: false,
        navigationHelpButton: false,
        baseLayerPicker: true,
        geocoder: false,
        homeButton: false
    });

    // Perbaikan SVG: Pastikan warna dan ukuran eksplisit
    const targetSvg = `
    <svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
        <rect width="100" height="100" fill="none" />
        <path d="M 5 25 L 5 5 L 25 5" fill="none" stroke="#ff3b3b" stroke-width="8"/>
        <path d="M 75 5 L 95 5 L 95 25" fill="none" stroke="#ff3b3b" stroke-width="8"/>
        <path d="M 95 75 L 95 95 L 75 95" fill="none" stroke="#ff3b3b" stroke-width="8"/>
        <path d="M 25 95 L 5 95 L 5 75" fill="none" stroke="#ff3b3b" stroke-width="8"/>
        <circle cx="50" cy="50" r="12" fill="#ff3b3b" />
        <circle cx="50" cy="50" r="25" fill="none" stroke="#ff3b3b" stroke-width="4" />
    </svg>`;

    const svgDataUri = 'data:image/svg+xml;base64,' + btoa(targetSvg);
    const startTime = Cesium.JulianDate.now();

    // Logika Berkedip (Show/Hide) - Ditingkatkan agar lebih kontras
    const blinkingShow = new Cesium.CallbackProperty((time) => {
        const seconds = Cesium.JulianDate.secondsDifference(time, startTime);
        return Math.floor(seconds * 3.0) % 2 === 0; // Kedip lebih cepat
    }, false);

    const manualProperties = [
        { name: "DPO - ALPHA", coords: [-6.224, 106.841] },
        { name: "DPO - BRAVO", coords: [-6.175, 106.827] }
    ];

    function renderList() {
        const container = document.getElementById('propertyList');
        manualProperties.forEach((prop, index) => {
            const [lat, lng] = prop.coords;
            const card = document.createElement('div');
            card.className = 'property-card';
            card.id = `card-${index}`;
            card.innerHTML = `
                <div class="card-content">
                    <h3 style="margin:0 0 5px 0; font-size:14px;">${prop.name}</h3>
                    <span class="coords-label">Lat: ${lat}, Lng: ${lng}</span>
                    <div class="button-group">
                        <button class="btn btn-go" onclick="focusMap(${lat}, ${lng}, ${index})">TRACKING</button>
                        <a href="https://www.google.com/maps?q=${lat},${lng}" target="_blank" class="btn btn-maps">MAPS</a>
                    </div>
                </div>`;
            container.appendChild(card);
        });
    }

    function focusMap(lat, lng, index) {
        viewer.entities.removeAll(); 

        // Update UI
        document.querySelectorAll('.property-card').forEach(c => c.classList.remove('active'));
        document.getElementById(`card-${index}`).classList.add('active');
        document.getElementById('coords-display').innerText = `${lat.toFixed(4)} | ${lng.toFixed(4)}`;

        // Buat Marker yang PASTI terlihat
        viewer.entities.add({
            position: Cesium.Cartesian3.fromDegrees(lng, lat),
            billboard: {
                image: svgDataUri,
                width: 64,  // Ukuran tetap agar tidak terlalu kecil
                height: 64,
                show: blinkingShow,
                // eyeOffset: Memastikan marker berada di depan objek lain
                eyeOffset: new Cesium.Cartesian3(0, 0, -10),
                // disableDepthTestDistance: Supaya tidak tertimbun bangunan/tanah
                disableDepthTestDistance: Number.POSITIVE_INFINITY,
                verticalOrigin: Cesium.VerticalOrigin.CENTER,
                horizontalOrigin: Cesium.HorizontalOrigin.CENTER,
                heightReference: Cesium.HeightReference.RELATIVE_TO_GROUND
            }
        });

        // Kamera terbang ke lokasi
        viewer.camera.flyTo({
            destination: Cesium.Cartesian3.fromDegrees(lng, lat, 1000), // Ketinggian 1km
            orientation: {
                pitch: Cesium.Math.toRadians(-90.0), // Melihat lurus ke bawah
                heading: 0.0
            },
            duration: 2
        });
    }

    renderList();
    // Posisi awal kamera (Jakarta)
    viewer.camera.setView({ destination: Cesium.Cartesian3.fromDegrees(106.82, -6.17, 20000) });
</script>
</body>
</html>
