<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>candiru6_ctrl_cesium</title>
    
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.108/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.108/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    
    <style>
        :root {
            --primary-red: #ff3b3b;
            --accent-glow: #ff0000;
            --cyber-neon: #00ffcc;
            --cyber-amber: #ffaa00;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            background-color: #000000;
            color: var(--cyber-neon);
        }

        /* Cesium sebagai Background Penuh */
        #cesiumContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        /* Overlay Panel Kontrol (Tactical Glassmorphism) */
        .control-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 420px;
            max-height: calc(100vh - 40px);
            z-index: 10;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--cyber-neon);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.15);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }

        .btn {
            color: #000000;
            border: 1px solid transparent;
            padding: 12px 20px;
            font-size: 13px;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            flex: 1;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-view {
            background-color: var(--cyber-neon);
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
        }

        .btn-view:hover:not(:disabled) {
            background-color: #000000;
            color: var(--cyber-neon);
            border-color: var(--cyber-neon);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.6);
        }

        .btn-delete {
            background-color: #ff0055;
            color: #fff;
            box-shadow: 0 0 10px rgba(255, 0, 85, 0.3);
        }

        .btn-delete:hover:not(:disabled) {
            background-color: #000000;
            color: #ff0055;
            border-color: #ff0055;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.6);
        }

        /* Gaya Tombol Toggle Dinamis */
        .btn-toggle {
            background-color: #111;
            color: var(--cyber-amber);
            border: 1px solid var(--cyber-amber);
            box-shadow: 0 0 10px rgba(255, 170, 0, 0.2);
            width: 100%;
            margin-bottom: 20px;
        }

        .btn-toggle:hover:not(:disabled) {
            background-color: var(--cyber-amber);
            color: #000;
            box-shadow: 0 0 15px rgba(255, 170, 0, 0.5);
        }

        .btn-toggle.active {
            background-color: #39ff14 !important;
            color: #000 !important;
            border-color: #39ff14 !important;
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.6) !important;
        }

        .btn:disabled {
            background-color: #1a1a1a !important;
            color: #444444 !important;
            border-color: #444444 !important;
            box-shadow: none !important;
            cursor: not-allowed;
            opacity: 0.5;
        }

        h2 {
            color: var(--cyber-neon);
            margin-top: 0;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
            font-size: 22px;
            text-align: center;
        }

        /* Gaya Khusus untuk Listed Target Counter */
        .listed-counter {
            background: rgba(0, 255, 204, 0.05);
            border: 1px dashed rgba(0, 255, 204, 0.3);
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 12px;
            font-weight: bold;
            color: var(--cyber-neon);
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            letter-spacing: 1px;
        }

        .listed-counter .counter-value {
            color: #39ff14;
            text-shadow: 0 0 8px rgba(57, 255, 20, 0.6);
        }

        .data-item-wrapper {
            display: flex;
            align-items: stretch;
            gap: 8px;
            margin-bottom: 8px;
            width: 100%;
            box-sizing: border-box;
        }

        .data-item-btn {
            background-color: rgba(17, 17, 17, 0.8);
            color: #39ff14;
            border: 1px solid rgba(57, 255, 20, 0.4);
            text-align: left;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Courier New', Courier, monospace;
            transition: all 0.2s ease;
            flex: 1;
            white-space: pre-wrap;
            word-break: break-all;
            overflow-wrap: break-word;
            overflow: hidden;
        }

        .data-item-btn:hover {
            background-color: rgba(57, 255, 20, 0.15);
            border-color: #39ff14;
            box-shadow: 0 0 10px rgba(57, 255, 20, 0.3);
        }

        .data-item-btn.active {
            background-color: #39ff14 !important;
            color: #000000 !important;
            border-color: #39ff14 !important;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.6);
        }
        
        .data-item-btn.active span {
            color: #111111 !important;
        }

        .btn-delete-single {
            background-color: rgba(34, 34, 34, 0.8);
            color: #ff0055;
            border: 1px solid rgba(255, 0, 85, 0.4);
            border-radius: 6px;
            padding: 0 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.2s ease;
        }

        .btn-delete-single:hover {
            background-color: #ff0055;
            color: #fff;
            border-color: #ff0055;
            box-shadow: 0 0 10px rgba(255, 0, 85, 0.5);
        }

        .label-box {
            text-align: left;
            font-weight: bold;
            font-size: 11px;
            color: #8892b0;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #status {
            padding: 12px;
            border-radius: 6px;
            font-size: 12px;
            text-align: left;
            margin-bottom: 15px;
            display: none;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid rgba(0, 255, 204, 0.4);
            color: #a8b2d1;
            white-space: pre-line;
            max-height: 100px;
            overflow-y: auto;
        }

        #dataContainer {
            max-height: 320px;
            overflow-y: auto;
            text-align: left;
        }

        /* Instruksi Ganti Basemap Mengambang */
        .map-instruction {
            position: absolute;
            top: 20px; 
            right: 40px; 
            z-index: 10;
            display: flex; 
            align-items: center; 
            pointer-events: none;
            animation: pulse-glow 2s infinite;
        }
        
        .instruction-text {
            background: var(--primary-red);
            color: white; 
            padding: 8px 15px;
            border-radius: 4px; 
            font-size: 11px; 
            font-weight: 800;
            text-transform: uppercase; 
            letter-spacing: 1px;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        @keyframes pulse-glow {
            0% { opacity: 0.7; transform: translateX(0); }
            50% { opacity: 1; transform: translateX(-5px); }
            100% { opacity: 0.7; transform: translateX(0); }
        }
        
        .cesium-viewer-bottom { display: none !important; }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.5);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 204, 0.4);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 255, 204, 0.8);
        }
      
        /* TARGET OPTIMASI MEDIA QUERY ANDROID */
        @media (max-width: 768px) {
            body, html { 
                overflow: auto !important; 
            }
            #cesiumContainer { 
                height: 50vh; 
                width: 100%; 
                position: relative; 
            }
            .control-panel {
                position: relative;
                width: 100%; 
                height: auto; 
                top: 0;
                left: 0;
                border-left: none;
                border-radius: 0px;
                border-top: 2px solid var(--primary-red); 
                background: rgba(5,5,5,0.95);
                max-height: none;
                box-shadow: none;
                padding: 15px;
                box-sizing: border-box;
            }
            #dataContainer {
                max-height: 250px;
            }
            .cesium-viewer-toolbar { 
                right: 10px !important; 
                top: 10px !important; 
                }
            .map-instruction { 
                right: 10px; 
                top: 50px; 
            }
        }
    </style>
</head>
<body>

<div id="cesiumContainer"></div>

<div class="map-instruction">
    <div class="instruction-text">GANTI BASEMAP > OTHER > ARCGIS WORLD IMAGERY</div>
</div>

<div class="control-panel">
    <h2>expedisi</h2>
    
    <div class="btn-group">
        <button id="viewBtn" class="btn btn-view" onclick="fetchAndShowValues()">Refresh</button>
        <button id="deleteBtn" class="btn btn-delete" onclick="startDeletion()">Hapus Semua</button>
    </div>
    
    <button id="toggleBtn" class="btn btn-toggle" onclick="toggleExpedisiState()">PANGGIL: LOADING...</button>
    
    <div class="label-box" id="statusLabel" style="display:none;">Logs:</div>
    <div id="status"></div>

    <div class="label-box" id="previewLabel" style="display:none;">Pilih Data Target:</div>
    
    <div id="counterWrapper" style="display:none;">
        <div class="listed-counter">
            <span>TRACKER STATUS:</span>
            <span class="counter-value" id="listedCountText">0 TARGET LISTED</span>
        </div>
    </div>
    
    <div id="dataContainer"></div>
</div>

<script>
    const CONFIG = {
        URL: "https://super-camel-75084.upstash.io",
        TOKEN: "gQAAAAAAASVMAAIgcDI0MjBkMmM4NTRkYWU0OTEyYTZmZWU5ODkxNGI1MmNjZg",
        TARGET_KEY: "truktutup1", // List key dari tracker lokasi Anda
        TOGGLE_KEY: "expedisi:panggil" 
    };

    const statusDiv = document.getElementById('status');
    const dataContainer = document.getElementById('dataContainer');
    const deleteBtn = document.getElementById('deleteBtn');
    const viewBtn = document.getElementById('viewBtn');
    const toggleBtn = document.getElementById('toggleBtn');
    
    const statusLabel = document.getElementById('statusLabel');
    const previewLabel = document.getElementById('previewLabel');
    const counterWrapper = document.getElementById('counterWrapper');
    const listedCountText = document.getElementById('listedCountText');

    let viewer;
    let activeIndex = null;
    let currentToggleState = 0; 

    window.onload = function() {
        initCesium();
        fetchAndShowValues();
        getInitialToggleState(); 
    };

    function initCesium() {
        viewer = new Cesium.Viewer('cesiumContainer', {
            terrainProvider: new Cesium.EllipsoidTerrainProvider(),
            animation: false,
            timeline: false,
            infoBox: false,
            selectionIndicator: false,
            navigationHelpButton: false,
            baseLayerPicker: true, 
            geocoder: true,
            homeButton: true,
            sceneModePicker: true
        });
        
        viewer.camera.setView({ 
            destination: Cesium.Cartesian3.fromDegrees(106.82, -6.17, 30000) 
        });
    }

    function logMessage(msg) {
        statusLabel.style.display = 'block';
        statusDiv.style.display = 'block';
        statusDiv.innerText += msg + "\n";
        statusDiv.scrollTop = statusDiv.scrollHeight;
    }

    function setActionLoading(isLoading, text = "Memproses...") {
        deleteBtn.disabled = isLoading;
        viewBtn.disabled = isLoading;
        toggleBtn.disabled = isLoading;
        if(isLoading) {
            deleteBtn.innerText = text;
        } else {
            deleteBtn.innerText = "Hapus Semua";
            viewBtn.innerText = "Refresh";
        }
    }

    function updateListedCounter() {
        const count = dataContainer.querySelectorAll('.data-item-wrapper').length;
        if(count > 0) {
            counterWrapper.style.display = 'block';
            listedCountText.innerText = `${count} TARGET LISTED`;
        } else {
            counterWrapper.style.display = 'none';
        }
    }

    async function upstashFetch(command) {
        const response = await fetch(`${CONFIG.URL}`, {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${CONFIG.TOKEN}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(command)
        });
        return response.json();
    }

    async function getInitialToggleState() {
        try {
            const res = await upstashFetch(["GET", CONFIG.TOGGLE_KEY]);
            if (!res.error && res.result !== null) {
                currentToggleState = parseInt(res.result) === 1 ? 1 : 0;
            } else {
                currentToggleState = 0; 
            }
            updateToggleUI(currentToggleState);
        } catch (e) {
            console.error("Gagal sinkronisasi state awal toggle:", e);
            toggleBtn.innerText = "PANGGIL: ERROR";
        }
    }

    async function toggleExpedisiState() {
        setActionLoading(true, "Sinkronisasi...");
        const targetState = currentToggleState === 1 ? 0 : 1;
        logMessage(`Mengubah sinyal panggil ke state: ${targetState}...`);

        try {
            const res = await upstashFetch(["SET", CONFIG.TOGGLE_KEY, String(targetState)]);
            if (res.error) throw new Error(res.error);

            currentToggleState = targetState;
            updateToggleUI(currentToggleState);
            logMessage(`[SUKSES] Sinyal panggil disetel ke: ${currentToggleState}`);
        } catch (error) {
            logMessage(`[ERROR] Gagal mengirim sinyal: ${error.message}`);
        } finally {
            setActionLoading(false);
        }
    }

    function updateToggleUI(state) {
        if (state === 1) {
            toggleBtn.classList.add('active');
            toggleBtn.innerText = "PANGGIL ACTIVATED";
        } else {
            toggleBtn.classList.remove('active');
            toggleBtn.innerText = "PANGGIL STANDBY";
        }
    }

    // MEMBACA DATA MENGGUNAKAN LRANGE (UNTUK REDIS LIST)
    async function fetchAndShowValues() {
        setActionLoading(true, "Membaca...");
        statusDiv.innerText = "";
        dataContainer.innerHTML = "";
        previewLabel.style.display = 'none';
        counterWrapper.style.display = 'none';
        
        viewer.entities.removeAll();
        activeIndex = null;

        logMessage(`Mengambil log koordinat dari list '${CONFIG.TARGET_KEY}'...`);

        try {
            // Ambil seluruh elemen di dalam list dari index 0 sampai akhir (-1)
            const res = await upstashFetch(["LRANGE", CONFIG.TARGET_KEY, "0", "-1"]);
            if (res.error) throw new Error(res.error);

            const listItems = res.result || [];

            if (listItems.length === 0) {
                logMessage("Tidak ada data pelacak di list 'truktutup1'.");
                dataContainer.innerHTML = "<div style='color: #ff0055; text-align:center; padding:10px;'>List Kosong</div>";
            } else {
                logMessage(`Sukses mendeteksi ${listItems.length} log posisi.`);
                previewLabel.style.display = 'block';
                
                // Urutkan terbalik agar kiriman terbaru muncul paling atas di panel kontrol
                const reversedItems = [...listItems].reverse();

                reversedItems.forEach((rawString, index) => {
                    let parsedData;
                    try {
                        parsedData = JSON.parse(rawString);
                    } catch(e) {
                        parsedData = rawString;
                    }
                    
                    const wrapper = document.createElement('div');
                    wrapper.className = 'data-item-wrapper';

                    const button = document.createElement('button');
                    button.className = 'data-item-btn';
                    button.id = `card-${index}`;
                    
                    // Tampilkan info payload GPS
                    let previewText = typeof parsedData === 'object' ? JSON.stringify(parsedData) : parsedData;
                    let timeLabel = parsedData.timestamp ? new Date(parsedData.timestamp).toLocaleTimeString() : `LOG #${listItems.length - index}`;
                    
                    button.innerHTML = `<strong>${timeLabel}</strong><br><span style="font-size:11px; color:#a8b2d1;">${previewText}</span>`;
                    
                    button.onclick = function() {
                        const coords = extractLatLng(parsedData);
                        if(coords) {
                            focusTarget(coords.lat, coords.lng, index);
                        } else {
                            logMessage(`[ERROR] Gagal memparsing lat/long.`);
                            alert(`Gagal mendeteksi data posisi geografis.\nData: ${previewText}`);
                        }
                    };
                    
                    const deleteSingleBtn = document.createElement('button');
                    deleteSingleBtn.className = 'btn-delete-single';
                    deleteSingleBtn.innerHTML = '🗑️';
                    deleteSingleBtn.title = "Hapus log baris ini";
                    
                    deleteSingleBtn.onclick = async function(e) {
                        e.stopPropagation();
                        
                        if (confirm(`Apakah Anda yakin ingin menghapus baris log data ini dari database?`)) {
                            deleteSingleBtn.disabled = true;
                            deleteSingleBtn.innerText = "⏳";
                            try {
                                logMessage(`Menghapus spesifik elemen list...`);
                                // Perintah LREM di Redis: hapus item yang sama persis sebanyak 1 kali
                                const delRes = await upstashFetch(["LREM", CONFIG.TARGET_KEY, "1", rawString]);
                                if (delRes.error) throw new Error(delRes.error);
                                
                                logMessage(`Elemen sukses terhapus.`);
                                wrapper.remove();
                                updateListedCounter();
                                
                                if (activeIndex === index) {
                                    viewer.entities.removeAll();
                                    activeIndex = null;
                                }
                                
                                if(dataContainer.children.length === 0) {
                                    previewLabel.style.display = 'none';
                                    counterWrapper.style.display = 'none';
                                    dataContainer.innerHTML = "<div style='color: #ff0055; text-align:center; padding:10px;'>List Kosong</div>";
                                }
                            } catch (err) {
                                logMessage(`Gagal menghapus item: ${err.message}`);
                                deleteSingleBtn.disabled = false;
                                deleteSingleBtn.innerHTML = '🗑️';
                            }
                        }
                    };

                    wrapper.appendChild(button);
                    wrapper.appendChild(deleteSingleBtn);
                    dataContainer.appendChild(wrapper);
                });
                
                updateListedCounter();
            }

        } catch (error) {
            logMessage(`Gagal membaca list: ${error.message}`);
        } finally {
            setActionLoading(false);
        }
    }

    function extractLatLng(data) {
        let lat = null;
        let lng = null;
        let targetString = "";

        if (typeof data === 'object' && data !== null) {
            lat = data.lat ?? data.latitude;
            lng = data.long ?? data.lng ?? data.longitude;
        } else if (data) {
            targetString = String(data);
        }

        if (targetString && (lat === null || lng === null)) {
            const regex = /(-?\d+\.\d+)\s*[\s,]\s*(-?\d+\.\d+)/;
            const match = targetString.match(regex);
            if (match) {
                lat = match[1];
                lng = match[2];
            }
        }

        if (lat !== null && lng !== null && !isNaN(parseFloat(lat)) && !isNaN(parseFloat(lng))) {
            return { lat: parseFloat(lat), lng: parseFloat(lng) };
        }
        return null;
    }

    function focusTarget(lat, lng, index) {
        viewer.entities.removeAll(); 
        activeIndex = index;
        
        document.querySelectorAll('.data-item-btn').forEach(c => c.classList.remove('active'));
        const activeCard = document.getElementById(`card-${index}`);
        if(activeCard) {
            activeCard.classList.add('active');
            activeCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        const destination = Cesium.Cartesian3.fromDegrees(lng, lat);

        viewer.entities.add({
            polyline: {
                positions: new Cesium.CallbackProperty(() => {
                    const cardElem = document.getElementById(`card-${activeIndex}`);
                    if(!cardElem) return [destination, destination];
                    const rect = cardElem.getBoundingClientRect();
                    const screenPos = new Cesium.Cartesian2(rect.left, rect.top + (rect.height / 2));
                    const ray = viewer.camera.getPickRay(screenPos);
                    const startPos = viewer.scene.globe.pick(ray, viewer.scene) || viewer.camera.position;
                    return [startPos, destination];
                }, false),
                width: 2,
                material: Cesium.Color.RED.withAlpha(0.5),
                arcType: Cesium.ArcType.GEODESIC
            }
        });

        const targetSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
            <path d="M 10 30 L 10 10 L 30 10" fill="none" stroke="#ff3b3b" stroke-width="6"/>
            <path d="M 70 10 L 90 10 L 90 30" fill="none" stroke="#ff3b3b" stroke-width="6"/>
            <path d="M 90 70 L 90 90 L 70 90" fill="none" stroke="#ff3b3b" stroke-width="6"/>
            <path d="M 30 90 L 10 90 L 10 70" fill="none" stroke="#ff3b3b" stroke-width="6"/>
            <circle cx="50" cy="50" r="12" fill="none" stroke="#ff3b3b" stroke-width="3" />
            <circle cx="50" cy="50" r="5" fill="#ff3b3b" />
        </svg>`;

        viewer.entities.add({
            position: destination,
            billboard: {
                image: 'data:image/svg+xml;base64,' + btoa(targetSvg),
                scale: new Cesium.CallbackProperty((time) => {
                    const sec = Cesium.JulianDate.secondsDifference(time, Cesium.JulianDate.now());
                    return 0.8 + Math.abs(Math.sin(sec * 4)) * 0.4; 
                }, false),
                verticalOrigin: Cesium.VerticalOrigin.CENTER,
                heightReference: Cesium.HeightReference.RELATIVE_TO_GROUND
            }
        });

        logMessage(`Menghubungkan lintasan... Melacak posisi koordinat pada globe.`);
        
        viewer.camera.flyTo({
            destination: Cesium.Cartesian3.fromDegrees(lng, lat, 2500),
            orientation: { 
                pitch: Cesium.Math.toRadians(-30.0), 
                heading: 0.0 
            },
            duration: 2.5
        });

        logMessage(`[SUKSES] Target Terkunci pada Posisi: ${lat}, ${lng}`);
    }

    async function startDeletion() {
        if (!confirm("Apakah Anda yakin ingin mengosongkan SELURUH isi list koordinat 'truktutup1'?")) return;
        
        setActionLoading(true, "Menghapus...");
        statusDiv.innerText = "";
        dataContainer.innerHTML = "";
        previewLabel.style.display = 'none';
        counterWrapper.style.display = 'none';
        
        viewer.entities.removeAll();
        activeIndex = null;

        logMessage("Melakukan pembersihan total key 'truktutup1'...");

        try {
            // Untuk menghapus total satu list di Redis, cukup gunakan DEL pada key list tersebut
            const delRes = await upstashFetch(["DEL", CONFIG.TARGET_KEY]);
            if (delRes.error) throw new Error(delRes.error);

            logMessage(`Pembersihan sukses. Database list dikosongkan.`);
            dataContainer.innerHTML = "<div style='color: #ff0055; text-align:center; padding:10px;'>List Kosong</div>";

        } catch (error) {
            logMessage(`Terjadi kesalahan saat wipe: ${error.message}`);
        } finally {
            setActionLoading(false);
        }
    }
</script>

</body>
</html>
