<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Pipeline Dashboard - Last Issue Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --text: #e6edf3;
            --accent: #58a6ff;
            --green: #238636;  /* Closing */
            --orange: #d29922; /* Progress */
            --red: #da3633;    /* Mulai */
            --border: #30363d;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 1100px; }
        
        .header { 
            text-align: center; 
            margin-bottom: 30px; 
            border-bottom: 1px solid var(--border); 
            padding-bottom: 20px; 
        }
        
        .top-row {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .chart-container { height: 250px; position: relative; display: flex; justify-content: center; }

        /* Table Styling */
        .table-card { overflow: hidden; }
        .table-wrapper { overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.9rem; }
        th { padding: 12px; border-bottom: 2px solid var(--border); color: var(--accent); text-transform: uppercase; font-size: 0.75rem; }
        td { padding: 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        
        .progress-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.8rem;
            color: white;
            display: inline-block;
            text-align: center;
        }

        .issue-text {
            font-size: 0.85rem;
            max-width: 250px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sync-indicator { 
            font-size: 0.7rem; 
            color: var(--green); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 5px;
            margin-top: 5px;
        }

        .dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; display: inline-block; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }

        @media (max-width: 768px) { .top-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>SALES PIPELINE OVERVIEW</h1>
        <div class="sync-indicator">
            <span class="dot"></span> LIVE SYNC ACTIVE (UPSTASH)
        </div>
    </div>

    <div class="top-row">
        <!-- Grafik Distribusi -->
        <div class="card">
            <h3 style="margin-top:0; font-size: 1rem; text-align: center;">Stage Distribution</h3>
            <div class="chart-container">
                <canvas id="pieChart"></canvas>
            </div>
        </div>

        <!-- Ringkasan Angka -->
        <div class="card" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div style="text-align: center; display: flex; flex-direction: column; justify-content: center; border-right: 1px solid var(--border);">
                <div style="font-size: 3.5rem; font-weight: bold;" id="total-count">0</div>
                <div style="color: #8b949e; font-size: 0.8rem;">TOTAL PROJECTS</div>
            </div>
            <div style="text-align: center; display: flex; flex-direction: column; justify-content: center;">
                <div style="font-size: 3.5rem; font-weight: bold; color: var(--accent);" id="avg-progress">0%</div>
                <div style="color: #8b949e; font-size: 0.8rem;">AVG. PROGRESS</div>
            </div>
        </div>
    </div>

    <!-- Tabel Semua Key sales_ -->
    <div class="card table-card">
        <h3 style="margin: 0; color: var(--accent);">Detailed Project List</h3>
        <div class="table-wrapper">
            <table id="project-table">
                <thead>
                    <tr>
                        <th>Project / Client</th>
                        <th>Progress (%)</th>
                        <th>Visual Bar</th>
                        <th>Last Issue</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- Data otomatis masuk di sini -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const CONFIG = {
        URL: "https://enabled-crayfish-71186.upstash.io",
        TOKEN: "gQAAAAAAARYSAAIncDE2MzUzMjQ5Mzg2N2E0YzU2OTUxODJjZWNmY2E2NzkyMXAxNzExODY",
        PREFIX: "sales_"
    };

    let myPieChart;

    async function updateDashboard() {
        try {
            const resKeys = await fetch(`${CONFIG.URL}/keys/${CONFIG.PREFIX}*`, {
                headers: { Authorization: `Bearer ${CONFIG.TOKEN}` }
            });
            const dataKeys = await resKeys.json();
            const keys = dataKeys.result;

            if (!keys || keys.length === 0) return;

            const resValues = await fetch(`${CONFIG.URL}/mget/${keys.join('/')}`, {
                headers: { Authorization: `Bearer ${CONFIG.TOKEN}` }
            });
            const dataValues = await resValues.json();
            const rawData = dataValues.result;

            let categories = { 'Mulai': 0, 'Progress': 0, 'Closing': 0 };
            let totalProgress = 0;
            let rowsHTML = "";

            rawData.forEach((item, index) => {
                const data = JSON.parse(item);
                const p = data.progress || 0;
                const client = data.client || keys[index].replace(CONFIG.PREFIX, '');
                
                // Ambil Last Issue dari data steps
                const lastIssue = (data.steps && data.steps.ISSUE && data.steps.ISSUE.text) 
                                  ? `⚠️ ${data.steps.ISSUE.text}` 
                                  : `<span style="color:var(--green)">✅ No Issues</span>`;
                
                totalProgress += p;

                // Logika Warna & Grafik
                let color = "";
                if (p <= 30) {
                    color = "var(--red)";
                    categories['Mulai']++;
                } else if (p <= 70) {
                    color = "var(--orange)";
                    categories['Progress']++;
                } else {
                    color = "var(--green)";
                    categories['Closing']++;
                }

                rowsHTML += `
                    <tr>
                        <td><strong>${client}</strong></td>
                        <td><span class="progress-badge" style="background: ${color}">${p}%</span></td>
                        <td style="width: 150px;">
                            <div style="width: 100%; background: #30363d; height: 8px; border-radius: 4px; overflow: hidden;">
                                <div style="width: ${p}%; background: ${color}; height: 100%;"></div>
                            </div>
                        </td>
                        <td class="issue-text" title="${lastIssue.replace(/<[^>]*>?/gm, '')}">
                            ${lastIssue}
                        </td>
                    </tr>
                `;
            });

            document.getElementById('table-body').innerHTML = rowsHTML;
            document.getElementById('total-count').innerText = keys.length;
            document.getElementById('avg-progress').innerText = Math.round(totalProgress / keys.length) + "%";

            renderChart(categories);

        } catch (err) {
            console.error("Sync Error:", err);
        }
    }

    function renderChart(catData) {
        const ctx = document.getElementById('pieChart').getContext('2d');
        if (myPieChart) {
            myPieChart.data.datasets[0].data = Object.values(catData);
            myPieChart.update();
        } else {
            myPieChart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: Object.keys(catData),
                    datasets: [{
                        data: Object.values(catData),
                        backgroundColor: ['#da3633', '#d29922', '#238636'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { color: '#e6edf3', font: { size: 11 } } }
                    }
                }
            });
        }
    }

    updateDashboard();
    setInterval(updateDashboard, 5000);
</script>

</body>
</html>
